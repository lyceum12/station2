<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Станция тестирования</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #FFFFFF;
            font-family: 'Inter', 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-window {
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: #1E325A;
            height: 61px;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
        }
        .timer-box { display: flex; align-items: center; gap: 8px; }
        .timer-icon { background: #FFFFFF; border-radius: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #087475; }
        .timer { font-weight: 800; font-size: 24px; color: #087475; background: #FFFFFF; padding: 4px 12px; border-radius: 28px; }
        .kim-info { font-size: 20px; font-weight: 400; color: #FFFFFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top-actions { display: flex; gap: 12px; margin-left: auto; }
        .finish-btn { background: #10b981; color: white; padding: 8px 16px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; }
        .stats-panel {
            background: #e7edf9; padding: 5px 20px; display: flex; align-items: baseline; gap: 8px;
            border-bottom: 1px solid #E2E8F0; position: relative; flex-shrink: 0;
        }
        .stats-label { font-size: 16px; font-weight: 500; color: #000000; }
        .stats-count { font-size: 24px; font-weight: 800; color: #000000; }
        .questions-nav {
            position: absolute; left: 50%; transform: translateX(-50%); top: -12px; z-index: 25;
            background: #F8FAFC; padding: 5px; border-bottom: 1px solid #CBD5E1; overflow-x: auto;
            white-space: nowrap; scrollbar-width: thin; max-width: 60%;
        }
        .buttons-wrapper { display: inline-flex; gap: 8px; }
        .q-btn {
            width: 42px; height: 24px; border: none; border-radius: 6px; cursor: pointer;
            background: #F0F0F0; color: #1E325A; font-weight: 700; font-size: 14px;
        }
        .q-btn.answered { background: #C0C0C0; }
        .q-btn.current { background: #FFD7CC; box-shadow: 0 0 0 2px #FF8A5C; }
        .content-area { flex: 1; padding: 16px 20px; overflow-y: auto; }
        .question-html { font-family: 'Segoe UI', 'Arial', sans-serif; font-size: 1rem; line-height: 1.5; }
        .question-html img { max-width: 100%; }
        .file-bar { background: #1E325A; padding: 0 20px; display: flex; align-items: center; gap: 16px; min-height: 48px; flex-shrink: 0; flex-wrap: wrap; }
        .file-action-btn { background: #F0F0F0; border: none; padding: 6px 8px; cursor: pointer; font-weight: 600; }
        .answer-area { background: #FFFFFF; padding: 12px 20px 20px; border-top: 1px solid #D7DDD9; flex-shrink: 0; }
        .answer-textbox { width: 100%; min-height: 120px; padding: 16px; font-size: 20px; border: 1px solid #aaa; border-radius: 12px; resize: vertical; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:2000; }
        .login-card { background:white; border-radius:32px; padding:2rem; width:400px; max-width:90%; text-align:center; }
        .login-card input { width:100%; padding:0.8rem; margin:1rem 0; border:1px solid #ccc; border-radius:40px; }
        .error-msg { color:red; font-size:0.8rem; }
        .file-list { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
        .file-item { background:#f1f5f9; border-radius:20px; padding:4px 8px; display:inline-flex; align-items:center; gap:6px; }
        .results-container { padding:2rem; overflow-y:auto; height:100%; }
        .result-card { background:white; border-radius:24px; padding:1rem; margin-bottom:1rem; border:1px solid #e2e8f0; }
        .result-correct { color:#10b981; font-weight:bold; }
        .result-incorrect { color:#ef4444; font-weight:bold; }
        @media (max-width:768px) { .timer { font-size:18px; } .kim-info { font-size:14px; } .q-btn { width:32px; font-size:11px; } .answer-textbox { min-height:80px; } }
    </style>
</head>
<body><div class="app-window" id="appWindow"></div>

<script>
    let currentSession = null, currentTestObj = null, questionsOrder = [], currentQuestionIndex = 0, timerInterval = null, testFinished = false;
    function init() {
        const savedSession = localStorage.getItem("quiz_active_session");
        if(savedSession) {
            try {
                currentSession = JSON.parse(savedSession);
                if(currentSession.endTimestamp && currentSession.endTimestamp < Date.now()) { finishTest(true); return; }
                const tests = JSON.parse(localStorage.getItem("quiz_constructor_app") || "[]");
                currentTestObj = tests.find(t => t.id === currentSession.testId);
                if(!currentTestObj) { localStorage.removeItem("quiz_active_session"); showLoginForm(); return; }
                questionsOrder = currentSession.questionsOrder;
                currentQuestionIndex = currentSession.currentIndex;
                buildStudentUI(); restoreTimer(); restoreCurrentQuestion(); updateNavButtons(); updateAnswerCounter();
            } catch(e) { localStorage.removeItem("quiz_active_session"); showLoginForm(); }
        } else showLoginForm();
    }
    function showLoginForm() {
        document.getElementById("appWindow").innerHTML = `<div class="login-overlay"><div class="login-card"><h2>Вход в тестирование</h2><p>Введите код участника</p><input type="text" id="regNumber" placeholder="Код участника" autocomplete="off"><button id="loginBtn" style="background:#1E325A; color:white; padding:0.6rem 2rem; border:none; border-radius:40px;">Войти</button><div id="loginError" class="error-msg"></div></div></div>`;
        document.getElementById("loginBtn").addEventListener("click", () => {
            const reg = document.getElementById("regNumber").value.trim();
            if(!reg) { document.getElementById("loginError").innerText = "Введите код участника"; return; }
            const tests = JSON.parse(localStorage.getItem("quiz_constructor_app") || "[]");
            let foundTest = null, foundStudent = null;
            for(let test of tests) { const student = (test.students || []).find(s => s.registrationNumber === reg); if(student) { foundTest = test; foundStudent = student; break; } }
            if(!foundTest) { document.getElementById("loginError").innerText = "Код не найден. Обратитесь к учителю."; return; }
            startNewSession(foundTest, foundStudent, reg);
        });
    }
    function startNewSession(test, student, regNumber) {
        const questions = test.questions || [];
        const shuffled = [...questions]; for(let i=shuffled.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        const questionsOrderIds = shuffled.map(q=>q.id);
        const endTime = Date.now() + (test.timeLimitMinutes||60)*60*1000;
        currentSession = { testId: test.id, studentRegNumber: regNumber, studentName: student.fullName, startTime: Date.now(), endTimestamp: endTime, questionsOrder: questionsOrderIds, currentIndex: 0, answers: {} };
        for(let qid of questionsOrderIds) if(!currentSession.answers[qid]) currentSession.answers[qid] = { text: "", files: [] };
        localStorage.setItem("quiz_active_session", JSON.stringify(currentSession));
        currentTestObj = test; questionsOrder = questionsOrderIds; currentQuestionIndex = 0; saveSession(); buildStudentUI(); restoreTimer(); restoreCurrentQuestion(); updateNavButtons(); updateAnswerCounter();
    }
    function buildStudentUI() {
        document.getElementById("appWindow").innerHTML = `
            <div class="top-bar"><div class="timer-box"><div class="timer-icon">⏱️</div><div class="timer" id="timerDisplay">--:--</div></div><div class="kim-info">${escapeHtml(currentTestObj.title)}</div><div style="margin-left:auto; display:flex; gap:12px;"><button id="prevQBtn" style="background:#E2E8F0; border:none; padding:8px; border-radius:50%;"><svg width="24" height="24" fill="#6d899f" viewBox="0 0 16 16"><path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/></svg></button><button id="nextQBtn" style="background:#E2E8F0; border:none; padding:8px; border-radius:50%;"><svg width="24" height="24" fill="#6d899f" viewBox="0 0 16 16"><path d="M0 14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2zm4.5-6.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5a.5.5 0 0 1 0-1"/></svg></button></div><div class="top-actions"><button class="finish-btn" id="finishTestBtn">Завершить тестирование</button></div></div>
            <div class="stats-panel"><span class="stats-label">Дано ответов:</span><span class="stats-count" id="answerCounter">0/${questionsOrder.length}</span><div class="questions-nav" id="questionsNav"><div class="buttons-wrapper" id="buttonsContainer"></div></div><div style="position:absolute;right:90px;top:-12px;"><button id="zoomInBtn" style="background:none; border:none; cursor:pointer;"><svg width="36" height="36" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11M13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0"/><path d="M10.344 11.742q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1 6.5 6.5 0 0 1-1.398 1.4z"/><path fill-rule="evenodd" d="M6.5 3a.5.5 0 0 1 .5.5V6h2.5a.5.5 0 0 1 0 1H7v2.5a.5.5 0 0 1-1 0V7H3.5a.5.5 0 0 1 0-1H6V3.5a.5.5 0 0 1 .5-.5"/></svg></button><button id="zoomOutBtn" style="background:none; border:none; cursor:pointer;"><svg width="36" height="36" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11M13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0"/><path d="M10.344 11.742q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1 6.5 6.5 0 0 1-1.398 1.4z"/><path fill-rule="evenodd" d="M3 6.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5"/></svg></button></div></div>
            <div class="content-area"><div id="questionContent" class="question-html"></div></div>
            <div class="file-bar" id="fileBar"></div>
            <div class="answer-area"><textarea id="answerInput" class="answer-textbox" placeholder="Введите ответ здесь..."></textarea></div>
        `;
        window.timerDisplaySpan = document.getElementById("timerDisplay");
        window.answerCounterSpan = document.getElementById("answerCounter");
        window.questionsNavDiv = document.getElementById("buttonsContainer");
        window.questionContentDiv = document.getElementById("questionContent");
        window.answerTextarea = document.getElementById("answerInput");
        window.fileBarDiv = document.getElementById("fileBar");
        document.getElementById("prevQBtn").addEventListener("click",()=>changeQuestion(-1));
        document.getElementById("nextQBtn").addEventListener("click",()=>changeQuestion(1));
        document.getElementById("finishTestBtn").addEventListener("click",()=>finishTest(false));
        document.getElementById("zoomInBtn").addEventListener("click",()=>changeFontSize(1));
        document.getElementById("zoomOutBtn").addEventListener("click",()=>changeFontSize(-1));
        answerTextarea.addEventListener("input",()=>saveCurrentAnswer());
    }
    function restoreTimer() { if(timerInterval) clearInterval(timerInterval); updateTimerDisplay(); timerInterval = setInterval(()=>{ if(!currentSession) return; if(Date.now()>=currentSession.endTimestamp) { clearInterval(timerInterval); finishTest(true); } else updateTimerDisplay(); },1000); }
    function updateTimerDisplay() { if(!currentSession) return; const rem = Math.max(0, currentSession.endTimestamp - Date.now()); const m = Math.floor(rem/60000); const s = Math.floor((rem%60000)/1000); timerDisplaySpan.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function restoreCurrentQuestion() {
        const qid = questionsOrder[currentQuestionIndex];
        const q = currentTestObj.questions.find(qq=>qq.id===qid);
        if(!q) return;
        let html = "";
        if(q.editorData && q.editorData.blocks) {
            for(let b of q.editorData.blocks) {
                if(b.type==="paragraph") html+=`<p>${b.data.text}</p>`;
                else if(b.type==="header") html+=`<h${b.data.level}>${b.data.text}</h${b.data.level}>`;
                else if(b.type==="list") { const tag=b.data.style==="ordered"?"ol":"ul"; html+=`<${tag}>`; for(let i of b.data.items) html+=`<li>${i}</li>`; html+=`</${tag}>`; }
                else if(b.type==="image") html+=`<img src="${b.data.file.url}" alt="${b.data.caption||''}">`;
                else html+=`<div>${JSON.stringify(b.data)}</div>`;
            }
        } else html="<p>Нет содержимого вопроса</p>";
        questionContentDiv.innerHTML = html;
        const ansObj = currentSession.answers[qid] || { text:"", files:[] };
        answerTextarea.value = ansObj.text;
        renderFileBar(q); renderFileList(q);
    }
    function renderFileBar(q) {
        if(!fileBarDiv) return;
        if(q.requireFileAttachment) {
            fileBarDiv.innerHTML = `<div class="file-btn-group"><button id="attachFileBtn" class="file-action-btn">Прикрепить файл</button></div><div id="attachedFilesList" class="file-list"></div>`;
            document.getElementById("attachFileBtn").addEventListener("click",()=>{ const input=document.createElement("input"); input.type="file"; input.onchange=(e)=>{ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=(ev)=>{ const qid=questionsOrder[currentQuestionIndex]; const ans=currentSession.answers[qid]; if(!ans.files) ans.files=[]; ans.files.push({ name:file.name, type:file.type, dataURL:ev.target.result }); saveSession(); renderFileList(q); }; reader.readAsDataURL(file); } }; input.click(); });
            renderFileList(q);
        } else fileBarDiv.innerHTML = `<div style="color:white; padding:8px;">Файлы для этого вопроса не требуются</div>`;
    }
    function renderFileList(q) {
        const container = document.getElementById("attachedFilesList");
        if(!container) return;
        const qid = questionsOrder[currentQuestionIndex];
        const files = currentSession.answers[qid]?.files || [];
        if(files.length===0) container.innerHTML = "<span style='color:#ccc;'>Нет прикреплённых файлов</span>";
        else {
            container.innerHTML = files.map((f,idx)=>`<div class="file-item">${escapeHtml(f.name)} <button data-idx="${idx}" class="remove-file" style="background:none; border:none; cursor:pointer;">❌</button></div>`).join("");
            document.querySelectorAll(".remove-file").forEach(btn=>btn.addEventListener("click",(e)=>{ const idx=parseInt(btn.getAttribute("data-idx")); const ans=currentSession.answers[qid]; if(ans && ans.files) { ans.files.splice(idx,1); saveSession(); renderFileList(q); } }));
        }
    }
    function saveCurrentAnswer() { if(!currentSession) return; const qid=questionsOrder[currentQuestionIndex]; if(!currentSession.answers[qid]) currentSession.answers[qid]={text:"",files:[]}; currentSession.answers[qid].text=answerTextarea.value; saveSession(); updateNavButtons(); updateAnswerCounter(); }
    function saveSession() { localStorage.setItem("quiz_active_session",JSON.stringify(currentSession)); }
    function updateNavButtons() {
        if(!questionsNavDiv) return;
        let html="";
        for(let i=0;i<questionsOrder.length;i++) {
            const qid=questionsOrder[i];
            const answered = currentSession.answers[qid] && (currentSession.answers[qid].text.trim()!=="" || (currentSession.answers[qid].files && currentSession.answers[qid].files.length>0));
            html += `<button class="q-btn ${i===currentQuestionIndex?"current":""} ${answered?"answered":""}" data-idx="${i}">${i+1}</button>`;
        }
        questionsNavDiv.innerHTML=html;
        document.querySelectorAll(".q-btn").forEach(btn=>btn.addEventListener("click",(e)=>{ const idx=parseInt(btn.getAttribute("data-idx")); if(!isNaN(idx)) { saveCurrentAnswer(); currentQuestionIndex=idx; restoreCurrentQuestion(); updateNavButtons(); updateAnswerCounter(); } }));
    }
    function updateAnswerCounter() { if(!currentSession) return; let cnt=0; for(let qid of questionsOrder) { const a=currentSession.answers[qid]; if(a && (a.text.trim()!=="" || (a.files && a.files.length>0))) cnt++; } answerCounterSpan.innerText=`${cnt}/${questionsOrder.length}`; }
    function changeQuestion(delta) { saveCurrentAnswer(); const newIdx=currentQuestionIndex+delta; if(newIdx>=0 && newIdx<questionsOrder.length) { currentQuestionIndex=newIdx; restoreCurrentQuestion(); updateNavButtons(); updateAnswerCounter(); } }
    function changeFontSize(delta) { const cur=parseFloat(getComputedStyle(questionContentDiv).fontSize); let n=cur+delta; if(n<10) n=10; if(n>32) n=32; questionContentDiv.style.fontSize=n+"px"; }
    function finishTest(forced) {
        if(testFinished) return;
        if(timerInterval) clearInterval(timerInterval);
        saveCurrentAnswer();
        const answersArray = [];
        for(let qid of questionsOrder) { const a=currentSession.answers[qid]||{text:"",files:[]}; answersArray.push({ questionId: qid, answerText: a.text, files: a.files }); }
        const result = { studentRegNumber: currentSession.studentRegNumber, studentName: currentSession.studentName, finishedAt: Date.now(), answers: answersArray };
        const tests = JSON.parse(localStorage.getItem("quiz_constructor_app")||"[]");
        const testIdx = tests.findIndex(t=>t.id===currentSession.testId);
        if(testIdx!==-1) { if(!tests[testIdx].results) tests[testIdx].results=[]; tests[testIdx].results.push(result); localStorage.setItem("quiz_constructor_app",JSON.stringify(tests)); }
        localStorage.removeItem("quiz_active_session");
        testFinished=true;
        showResultsPage(result);
    }
    function showResultsPage(result) {
        const app = document.getElementById("appWindow");
        const showDetails = currentTestObj.showCorrectAnswersAfterTest || false;
        const questions = currentTestObj.questions || [];
        let correctCount=0, details=[];
        for(let i=0;i<questions.length;i++) {
            const q=questions[i];
            const userAns = result.answers.find(a=>a.questionId===q.id);
            const userAnswerText = userAns ? userAns.answerText : "(нет ответа)";
            let correctIndices = q.correctIndices;
            if(!correctIndices && q.answers) correctIndices = q.answers.reduce((arr,a,idx)=>{ if(a.isCorrect) arr.push(idx); return arr; },[]);
            const correctOptions = (q.answerOptions||[]).filter((_,idx)=>correctIndices.includes(idx)).join(", ");
            let isCorrect=false;
            if(userAns) {
                const opts = q.answerOptions||[];
                const userLow = userAns.answerText ? userAns.answerText.trim().toLowerCase() : "";
                const sel = [];
                for(let j=0;j<opts.length;j++) if(opts[j].toLowerCase()===userLow) sel.push(j);
                isCorrect = sel.length===correctIndices.length && sel.every(idx=>correctIndices.includes(idx));
            }
            if(isCorrect) correctCount++;
            details.push({ title: q.titleQuestion, userAnswer: userAnswerText, correctAnswer: correctOptions, isCorrect });
        }
        const total = questions.length;
        const percent = Math.round((correctCount/total)*100);
        let html = `<div class="results-container"><h1>Результаты тестирования</h1><p><strong>Ученик:</strong> ${escapeHtml(result.studentName)}</p><p><strong>Код участника:</strong> ${escapeHtml(result.studentRegNumber)}</p><p><strong>Ваш результат:</strong> ${correctCount} из ${total} (${percent}%)</p><hr>`;
        if(showDetails) {
            html += `<h2>Разбор вопросов</h2>`;
            for(let i=0;i<details.length;i++) {
                const d=details[i];
                const cls = d.isCorrect ? "result-correct" : "result-incorrect";
                const txt = d.isCorrect ? "Верно" : "Неверно";
                html += `<div class="result-card"><strong>Вопрос ${i+1}: ${escapeHtml(d.title)}</strong><br>Ваш ответ: ${escapeHtml(d.userAnswer)}<br>Правильный ответ: ${escapeHtml(d.correctAnswer)}<br><span class="${cls}">${txt}</span></div>`;
            }
        } else html += `<p>Показ правильных ответов отключён учителем.</p>`;
        html += `<button id="restartBtn" style="margin-top:2rem; background:#3b82f6; color:white; border:none; padding:0.8rem 2rem; border-radius:40px; cursor:pointer;">Завершить</button></div>`;
        app.innerHTML = html;
        document.getElementById("restartBtn").addEventListener("click",()=>{ window.location.reload(); });
    }
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m=> ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    init();
</script>
</body>
</html>
