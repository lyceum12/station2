<html lang="ru"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Станция КОГЭ 2025 - Информатика</title>
    <!-- Google Fonts для Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* легкая имитация нативного интерфейса, текст можно выделять */
        }

        body {
            background: #FFFFFF;
            font-family: 'Inter', 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* главное окно фиксированного размера, но с возможностью масштабирования (резина) */
        .app-window {
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 900px;
            min-width: 900px;
            min-height: 700px;
            background: #FFFFFF;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Верхняя синяя панель */
        .top-bar {
            background: #1E325A;
            height: 61px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 16px 0 16px;
            gap: 12px;
        }


        .kim-info {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 400;
            color: #FFFFFF;
            letter-spacing: 0.5px;
        }

        .timer-box {
            background: #1E325A;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer-icon {
            background: #FFFFFF;
            border-radius: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #087475;
        }
        .timer {
            font-family: 'Inter', monospace;
            font-weight: 800;
            font-size: 24px;
            color: #087475;
            background: #FFFFFF;
            padding: 4px 12px;
            border-radius: 28px;
            letter-spacing: 1px;
        }

        .top-actions {
            display: flex;
            gap: 12px;
            margin-left: auto;
        }
        .top-icon-btn {
            background: transparent;
            border: none;
            font-size: 20px;
            color: white;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: 0.2s;
        }
        .top-icon-btn:hover { background: #2c4a7a; }

        /* Панель "Дано ответов:" */
        .stats-panel {
            background: #e7edf9;
            padding: 5px 20px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid #E2E8F0;
			position: relative;
			
        }
        .stats-label {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #000000;
        }
        .stats-count {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #000000;
        }

        /* Контейнер кнопок вопросов (скролл, если нужно) */
        .questions-nav {
			position: absolute;
            left: 50%;
            transform: translateX(-50%);
			top:-12px;
			z-index: 25;
			display: flex;
            background: #F8FAFC;
            padding: 5px 5px;
            border-bottom: 1px solid #CBD5E1;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
        }
        .buttons-wrapper {
            display: inline-flex;
            gap: 8px;
            align-items: center;
        }
        .q-btn {
            font-family: 'Inter', 'Arial', sans-serif;
            font-weight: 700;
            font-size: 14px;
            width: 42px;
            height: 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.1s linear;
            background: #F0F0F0;
            color: #1E325A;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .q-btn.answered {
            background: #C0C0C0;
            color: #1E325A;
            position: relative;
        }
        .q-btn.current {
            background: #FFD7CC;
            color: #000000;
            box-shadow: 0 0 0 2px #FF8A5C;
        }
        .q-btn.nav-btn {
            background: #E2E8F0;
            width: 48px;
        }
        .q-btn:hover {
            filter: brightness(0.96);
        }
		/* Основная область с контентом вопроса */
        .content-area {
            flex: 1;
            background: #FFFFFF;
            padding: 16px 20px;
            overflow-y: auto;
            position: relative;
            border-bottom: 1px solid #D7DDD9;
        }
        .question-html {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            transition: all 0.2s ease;
        }
        .question-html img {
            max-width: 100%;
        }
       /* Нижняя панель с файловыми кнопками */
        .file-bar {
            background: #1E325A;
            padding: 0px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
		 .file-btn-group {
            display: flex;
            gap: 28px;
            align-items: center;
            padding: 0px 12px;
        }
        .file-action-btn {
			font-family: 'Inter', sans-serif;
			font-weight: 600;
			font-size: 13px;
			line-height: 13px;   
            background: #F0F0F0;
            border: none;
            padding: 6px 8px;
            cursor: pointer;
            transition: 0.1s linear;
            align-items: center;
        }
        .file-action-btn:active { background: #e2e8f0; }
		/* Текстовое поле ввода */
        .answer-area {
            background: #FFFFFF;
            padding: 12px 20px 20px 20px;
            border-top: 1px solid #D7DDD9;
            position: relative;
        }
        .answer-textbox {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 20px;
            border: 1px solid #aaa;
            border-radius: 12px;
            resize: vertical;
            background: #ffffff;
            color: #000716;
            outline: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .answer-textbox:focus {
            border-color: #1E325A;
        }
    </style>
</head>
<body>
<div class="app-window">
    <!-- Верхняя панель -->
    <div class="top-bar">
        <div class="timer-box">
            <div class="timer-icon">⏱️</div>
            <div class="timer" id="timerDisplay">150:00</div>
        </div><div class="kim-info" id="kimLabel">КИМ №------ БР №------</div>
		<div style="margin-left: auto; display: flex; gap: 12px; position: relative; top: -7px;">
			<button id="prevQBtn" style="background:#E2E8F0; border:none; padding:8px 8px; border-radius:50%;">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#6d899f" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
					<path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
				</svg>
			</button>
            <button id="nextQBtn" style="background:#E2E8F0; border:none; padding:8px 8px; border-radius:50%; cursor: pointer;">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#6d899f" class="bi bi-arrow-right-square-fill" viewBox="0 0 16 16">
					<path d="M0 14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2zm4.5-6.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5a.5.5 0 0 1 0-1"/>
				</svg>
			</button>
		</div>
        <div class="top-actions">
            <button class="top-icon-btn" id="btn222" title="Вопрос ?">?</button>
            <button class="top-icon-btn" id="btnMinimize" title="Свернуть">—</button>
            <button class="top-icon-btn" id="btnClose" title="Закрыть">✕</button>
        </div>
    </div>

    <!-- Строка статистики -->
    <div class="stats-panel">
        <span class="stats-label">Дано ответов:</span>
        <span class="stats-count" id="answerCounter">0/16</span>
    <!-- Навигация по вопросам (динамическая) -->
		<div class="questions-nav" id="questionsNav">
			<div class="buttons-wrapper" id="buttonsContainer">
			<button class="q-btn current">БР</button>
			<button class="q-btn">1</button>
			<button class="q-btn">2</button>
			<button class="q-btn">3</button>
			<button class="q-btn">4</button>
			<button class="q-btn">5</button>
			<button class="q-btn">6</button>
			<button class="q-btn">7</button>
			<button class="q-btn">8</button>
			<button class="q-btn">9</button>
			<button class="q-btn">10</button>
			<button class="q-btn">11</button>
			<button class="q-btn">12</button>
			<button class="q-btn">13</button>
			<button class="q-btn">14</button>
			<button class="q-btn">15</button>
			<button class="q-btn">16</button>
			</div>
		</div>
		<div style="position: absolute;right: 90px;top: -12px;">
		<button style="background:none; border:none; cursor: pointer;">
			<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" class="bi bi-zoom-in" viewBox="0 0 16 16">
			  <path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11M13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0"/>
			  <path d="M10.344 11.742q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1 6.5 6.5 0 0 1-1.398 1.4z"/>
			  <path fill-rule="evenodd" d="M6.5 3a.5.5 0 0 1 .5.5V6h2.5a.5.5 0 0 1 0 1H7v2.5a.5.5 0 0 1-1 0V7H3.5a.5.5 0 0 1 0-1H6V3.5a.5.5 0 0 1 .5-.5"/>
			</svg>
		</button>
		<button style="background:none; border:none; cursor: pointer;">
			<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" class="bi bi-zoom-out" viewBox="0 0 16 16">
			  <path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11M13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0"/>
			  <path d="M10.344 11.742q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1 6.5 6.5 0 0 1-1.398 1.4z"/>
			  <path fill-rule="evenodd" d="M3 6.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5"/>
			</svg>
		<button>
		</div>
	</div>
	<!-- Область контента вопроса -->
    <div class="content-area">
        <div id="questionContent" class="question-html" style="font-size: 1rem;"><h2>Бланк регистрации</h2><p>Введите номер бланка (только цифры).</p><p>Пример: 1234567890</p></div>
    </div>
	<div class="file-bar">
			<div class="file-btn-group">
				<button class="file-action-btn">⬆ 13.1</button>
				<button class="file-action-btn" style="opacity: 0.5;">⬇</button>
			</div>
			<div class="file-btn-group">
				<button class="file-action-btn">⬆ 13.2</button>
				<button class="file-action-btn" style="opacity: 0.5;">⬇</button>
			</div>
			<div class="file-btn-group">
				<button class="file-action-btn">⬆ 14</button>
				<button class="file-action-btn" style="opacity: 0.5;">⬇</button>
			</div>
			<div class="file-btn-group">
				<button class="file-action-btn">⬆ 15</button>
				<button class="file-action-btn" style="opacity: 0.5;">⬇</button>
			</div>
			<div class="file-btn-group">
				<button class="file-action-btn">⬆ 16</button>
				<button class="file-action-btn" style="opacity: 0.5;">⬇</button>
			</div>
			<div class="file-btn-group">
				<button class="file-action-btn" id="demoFilesBtn">⬇ Доп. файлы ⬇</button>
				<button class="file-action-btn" id="exportZipBtn">Выгрузить</button>
			</div>
		
    </div>
	<!-- Поле ввода ответа -->
    <div class="answer-area">
        <textarea id="answerInput" class="answer-textbox" placeholder="Введите номер бланка (только цифры)"></textarea>
    </div>
</body>
</html>
