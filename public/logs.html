<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Логи системы</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;padding:2rem;}
        .container{max-width:1200px;margin:0 auto;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden;}
        th,td{border:1px solid #e2e8f0;padding:0.75rem;text-align:left;}
        th{background:#f8fafc;}
        .back-link{display:inline-block;margin-bottom:1rem;}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <h1>Логи действий</h1>
    <table id="logsTable"><thead><tr><th>Дата</th><th>Пользователь</th><th>Действие</th><th>IP-адрес</th></tr></thead><tbody id="logsTbody"></tbody></table>
</div>
<script>
    async function loadLogs() {
        const res = await fetch('/api/logs');
        const logs = await res.json();
        const tbody = document.getElementById('logsTbody');
        tbody.innerHTML = logs.map(log => `<tr><td>${new Date(log.timestamp).toLocaleString()}</td><td>${escapeHtml(log.username)}</td><td>${escapeHtml(log.action)}</td><td>${escapeHtml(log.ip)}</td></tr>`).join('');
    }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    loadLogs();
</script>
</body>
</html>
