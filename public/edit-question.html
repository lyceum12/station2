<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Редактор вопроса</title>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.31.5/dist/editorjs.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.8/dist/header.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2.0.9/dist/editorjs-list.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@2.11.7/dist/paragraph.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;padding:2rem 1.5rem;}
        .container{max-width:1000px;margin:0 auto;}
        .back-link{display:inline-flex;align-items:center;gap:6px;background:white;padding:0.5rem 1rem;border-radius:40px;text-decoration:none;color:#1e293b;margin-bottom:1.5rem;border:1px solid #e2e8f0;}
        .card{background:white;border-radius:32px;padding:1.8rem;box-shadow:0 8px 20px rgba(0,0,0,0.05);}
        .form-group{margin-bottom:1.5rem;}
        label{font-weight:600;display:block;margin-bottom:0.5rem;}
        input[type="text"]{width:100%;padding:0.8rem 1rem;border:1px solid #cbd5e1;border-radius:20px;font-size:1rem;}
        .editor-wrapper{border:1px solid #e2e8f0;border-radius:24px;padding:0.5rem;background:#fefefe;}
        .answers-section{background:#f9fafb;border-radius:24px;padding:1.2rem;margin-top:1rem;}
        .answer-item{display:flex;align-items:center;gap:12px;margin-bottom:12px;background:white;padding:8px 12px;border-radius:60px;border:1px solid #e2e8f0;}
        .answer-text{flex:1;padding:8px 12px;border:1px solid #cbd5e1;border-radius:30px;}
        .answer-correct{width:24px;height:24px;accent-color:#3b82f6;}
        .btn-icon{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:40px;}
        .add-answer{margin-top:12px;background:#eef2ff;border:none;padding:0.5rem 1rem;border-radius:40px;cursor:pointer;}
        .checkbox-group{margin:1rem 0;display:flex;align-items:center;gap:12px;}
        .action-buttons{display:flex;justify-content:flex-end;gap:15px;margin-top:2rem;}
        .btn-save{background:#3b82f6;color:white;border:none;padding:0.8rem 2rem;border-radius:40px;font-weight:600;cursor:pointer;}
        .btn-cancel{background:white;border:1px solid #cbd5e1;padding:0.8rem 2rem;border-radius:40px;cursor:pointer;}
        .info-tip{font-size:0.75rem;color:#475569;margin-top:6px;}
    </style>
</head>
<body>
<div class="container">
    <a href="questions.html" id="backLink" class="back-link">← Вернуться к вопросам</a>
    <div class="card">
        <h2 id="formTitle">Создание вопроса</h2>
        <div class="form-group"><label>Заголовок вопроса</label><input type="text" id="questionTitle"></div>
        <div class="form-group"><label>Текст вопроса (можно вставить изображения)</label><div class="editor-wrapper"><div id="editorjs"></div></div><div class="info-tip">Для вставки изображения нажмите на плюс и выберите "Изображение"</div></div>
        <div class="checkbox-group"><input type="checkbox" id="requireFileAttachment"><label>Требуется прикрепление файлов к этому вопросу</label></div>
        <div class="answers-section"><label>Варианты ответов (отметьте правильные)</label><div id="answersList"></div><button type="button" id="addAnswerBtn" class="add-answer">+ Добавить вариант ответа</button></div>
        <div class="action-buttons"><button type="button" id="cancelBtn" class="btn-cancel">Отмена</button><button type="button" id="saveQuestionBtn" class="btn-save">Сохранить вопрос</button></div>
    </div>
</div>
<script>
    let editorInstance=null, currentTestId=null, currentQuestionId=null, currentAnswers=[];
    async function fetchJson(url, options={}) {
        const res = await fetch(url, {...options, credentials:'include', headers:{'Content-Type':'application/json', ...(options.headers||{})}});
        if(!res.ok) throw new Error(await res.text());
        return res.json();
    }
    async function init(){
        const params=new URLSearchParams(location.search);
        currentTestId=params.get('testId');
        const modeOrQid=params.get('questionId'), isNew=params.get('mode')==='new';
        if(!currentTestId){alert('Тест не указан');location.href='index.html';return;}
        const tests=await fetchJson('/api/tests');
        const test=tests.find(t=>t.id===currentTestId);
        if(!test){alert('Тест не найден');location.href='index.html';return;}
        document.getElementById('backLink').href=`questions.html?testId=${currentTestId}`;
        if(!isNew && modeOrQid && modeOrQid!=='null'){
            currentQuestionId=modeOrQid;
            const q=test.questions?.find(qq=>qq.id===currentQuestionId);
            if(q){loadQuestionData(q);document.getElementById('formTitle').innerText='Редактирование вопроса';}
            else{alert('Вопрос не найден');currentQuestionId=null;}
        }
        if(!currentQuestionId){document.getElementById('formTitle').innerText='Новый вопрос';resetForm();}
        await initEditor();
        if(window.pendingEditorData){await editorInstance.render(window.pendingEditorData);delete window.pendingEditorData;}
        renderAnswersUI();
    }
    function loadQuestionData(q){
        document.getElementById('questionTitle').value=q.titleQuestion||'';
        document.getElementById('requireFileAttachment').checked=q.requireFileAttachment||false;
        if(q.editorData && editorInstance) editorInstance.render(q.editorData);
        else if(q.editorData) window.pendingEditorData=q.editorData;
        currentAnswers=q.answers?[...q.answers]:[];
    }
    function resetForm(){
        if(editorInstance) editorInstance.clear();
        currentAnswers=[];renderAnswersUI();
        document.getElementById('questionTitle').value='';
        document.getElementById('requireFileAttachment').checked=false;
    }
    function renderAnswersUI(){
        const container=document.getElementById('answersList');
        if(!currentAnswers.length){container.innerHTML='<div style="padding:1rem;text-align:center;">Нет вариантов ответа</div>';return;}
        container.innerHTML=currentAnswers.map((a,idx)=>`<div class="answer-item"><input type="checkbox" class="answer-correct" data-idx="${idx}" ${a.isCorrect?'checked':''}><input type="text" class="answer-text" value="${escapeHtml(a.text)}" placeholder="Вариант" data-idx="${idx}"><button class="btn-icon remove-answer" data-idx="${idx}">🗑️</button></div>`).join('');
        document.querySelectorAll('.answer-correct').forEach(cb=>cb.addEventListener('change',e=>{const idx=parseInt(cb.dataset.idx);if(currentAnswers[idx])currentAnswers[idx].isCorrect=cb.checked;}));
        document.querySelectorAll('.answer-text').forEach(inp=>inp.addEventListener('input',e=>{const idx=parseInt(inp.dataset.idx);if(currentAnswers[idx])currentAnswers[idx].text=inp.value;}));
        document.querySelectorAll('.remove-answer').forEach(btn=>btn.addEventListener('click',e=>{const idx=parseInt(btn.dataset.idx);currentAnswers.splice(idx,1);renderAnswersUI();}));
    }
    async function initEditor(){
        class CustomImage{
            constructor({data}){this.data=data;this.wrapper=null;}
            static get isReadOnlySupported(){return true;}
            render(){
                this.wrapper=document.createElement('div');
                if(this.data?.file?.url){
                    const img=document.createElement('img');img.src=this.data.file.url;img.style.maxWidth='100%';this.wrapper.appendChild(img);
                    if(this.data.caption){const cap=document.createElement('figcaption');cap.innerText=this.data.caption;this.wrapper.appendChild(cap);}
                }else{
                    const btn=document.createElement('button');btn.innerText='Загрузить изображение';btn.style.padding='8px';btn.style.cursor='pointer';
                    btn.onclick=()=>{
                        const input=document.createElement('input');input.type='file';input.accept='image/*';
                        input.onchange=e=>{
                            const file=e.target.files[0];
                            if(file){
                                const reader=new FileReader();
                                reader.onload=ev=>{this.data={file:{url:ev.target.result},caption:''};this.wrapper.innerHTML='';const img=document.createElement('img');img.src=ev.target.result;img.style.maxWidth='100%';this.wrapper.appendChild(img);};
                                reader.readAsDataURL(file);
                            }
                        };
                        input.click();
                    };
                    this.wrapper.appendChild(btn);
                }
                return this.wrapper;
            }
            save(){return this.data;}
        }
        const tools={header:{class:window.Header,config:{placeholder:"Введите заголовок..."}},list:{class:window.EditorjsList,inlineToolbar:true},paragraph:{class:window.Paragraph,inlineToolbar:true},image:{class:CustomImage}};
        editorInstance=new window.EditorJS({holder:"editorjs",tools,placeholder:"Текст вопроса...",data:{}});
    }
    async function saveQuestion(){
        const title=document.getElementById('questionTitle').value.trim();
        if(!title){alert('Укажите заголовок');return;}
        if(!currentAnswers.length){alert('Добавьте варианты ответов');return;}
        if(currentAnswers.some(a=>!a.text.trim())){alert('Все варианты должны содержать текст');return;}
        if(!currentAnswers.some(a=>a.isCorrect)){alert('Выберите хотя бы один правильный ответ');return;}
        let editorData=editorInstance?await editorInstance.save():{blocks:[]};
        const newQuestion={id:currentQuestionId||('q_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)),titleQuestion:title,editorData,answers:currentAnswers.map(a=>({text:a.text,isCorrect:a.isCorrect})),answerOptions:currentAnswers.map(a=>a.text),correctIndices:currentAnswers.reduce((arr,a,idx)=>{if(a.isCorrect)arr.push(idx);return arr},[]),requireFileAttachment:document.getElementById('requireFileAttachment').checked,hasEditorContent:true};
        let tests=await fetchJson('/api/tests');
        const testIdx=tests.findIndex(t=>t.id===currentTestId);
        if(testIdx===-1){alert('Тест не найден');return;}
        if(!tests[testIdx].questions)tests[testIdx].questions=[];
        if(currentQuestionId){
            const qIdx=tests[testIdx].questions.findIndex(q=>q.id===currentQuestionId);
            if(qIdx!==-1)tests[testIdx].questions[qIdx]=newQuestion;
            else tests[testIdx].questions.push(newQuestion);
        }else tests[testIdx].questions.push(newQuestion);
        await fetchJson('/api/tests',{method:'POST',body:JSON.stringify(tests)});
        alert('Вопрос сохранён');
        location.href=`questions.html?testId=${currentTestId}`;
    }
    function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
    document.getElementById('addAnswerBtn').addEventListener('click',()=>{currentAnswers.push({text:"",isCorrect:false});renderAnswersUI();});
    document.getElementById('saveQuestionBtn').addEventListener('click',saveQuestion);
    document.getElementById('cancelBtn').addEventListener('click',()=>{if(confirm('Отменить изменения?'))location.href=`questions.html?testId=${currentTestId}`;});
    init();
</script>
</body>
</html>
