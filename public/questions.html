<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Управление вопросами</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;padding:2rem 1.5rem;}
        .container{max-width:1100px;margin:0 auto;}
        .back-link{display:inline-flex;align-items:center;gap:6px;background:white;padding:0.5rem 1rem;border-radius:40px;text-decoration:none;color:#1e293b;margin-bottom:1.5rem;border:1px solid #e2e8f0;}
        .header-info{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:2rem;gap:1rem;}
        .test-title-text{font-size:1.8rem;font-weight:700;color:#0f172a;}
        .edit-title-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0.3rem 0.6rem;border-radius:30px;color:#64748b;}
        .test-badge{background:#e2e8f0;padding:0.3rem 0.9rem;border-radius:30px;font-size:0.85rem;}
        .btn{border:none;padding:0.6rem 1.4rem;border-radius:40px;font-weight:600;cursor:pointer;}
        .btn-primary{background:#3b82f6;color:white;}
        .btn-outline{background:white;border:1px solid #cbd5e1;}
        .btn-danger{background:#fee2e2;color:#b91c1c;}
        .questions-grid{display:flex;flex-direction:column;gap:1rem;}
        .question-card{background:white;border-radius:24px;padding:1.2rem 1.5rem;border:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .empty-questions{background:white;border-radius:2rem;padding:3rem;text-align:center;color:#64748b;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:white;border-radius:32px;padding:2rem;max-width:600px;width:90%;max-height:80%;overflow-y:auto;}
        .task-item{border:1px solid #e2e8f0;border-radius:16px;padding:0.8rem;margin-bottom:0.8rem;cursor:pointer;}
        .task-item:hover{background:#f8fafc;}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <div class="header-info">
        <div><span class="test-title-text" id="testTitle"></span><button class="edit-title-btn" id="editTitleBtn">Редактировать</button><span class="test-badge" id="testIdBadge"></span></div>
        <div><button class="btn btn-outline" id="manageTestBtn">Управление тестом</button><button class="btn btn-outline" id="addFromBaseBtn">Добавить из базы</button><button class="btn btn-primary" id="createNewQuestionBtn">Создать вопрос</button></div>
    </div>
    <div id="questionsListContainer" class="questions-grid"></div>
</div>
<div id="taskModal" class="modal"><div class="modal-content"><h3>Выберите задание из базы</h3><div id="tasksListModal"></div><button id="closeTaskModal" class="btn">Закрыть</button></div></div>
<script>
    let currentTestId=null, currentTest=null;
    async function fetchTests(){ const r=await fetch('/api/tests'); return r.json(); }
    async function saveTests(tests){ await fetch('/api/tests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(tests)}); }
    async function fetchTasksBase(){ const r=await fetch('/api/tasks-base'); return r.json(); }
    async function loadTest(){
        const params=new URLSearchParams(location.search);
        currentTestId=params.get('testId');
        if(!currentTestId){ alert('Тест не указан'); location.href='index.html'; return; }
        const tests=await fetchTests();
        currentTest=tests.find(t=>t.id===currentTestId);
        if(!currentTest){ alert('Тест не найден'); location.href='index.html'; return; }
        document.getElementById('testTitle').innerText=escapeHtml(currentTest.title);
        document.getElementById('testIdBadge').innerText=`ID: ${currentTestId.slice(0,8)}`;
        renderQuestions();
    }
    async function renderQuestions(){
        const container=document.getElementById('questionsListContainer');
        const qs=currentTest.questions||[];
        if(!qs.length){ container.innerHTML='<div class="empty-questions">Нет вопросов. Создайте первый.</div>'; return; }
        container.innerHTML=qs.map((q,idx)=>`<div class="question-card"><div><h3>${escapeHtml(q.titleQuestion||'Без заголовка')}</h3><div style="font-size:0.75rem;">Правильных: ${q.correctIndices?.length||0} | ${q.requireFileAttachment?'Требует файл':'Без файла'}</div></div><div><button class="btn btn-outline edit-q" data-qid="${q.id}">Редактировать</button> <button class="btn btn-danger delete-q" data-qid="${q.id}">Удалить</button></div></div>`).join('');
        document.querySelectorAll('.edit-q').forEach(b=>b.addEventListener('click',()=>location.href=`edit-question.html?testId=${currentTestId}&questionId=${b.dataset.qid}`));
        document.querySelectorAll('.delete-q').forEach(b=>b.addEventListener('click',async()=>{ if(confirm('Удалить вопрос?')){ let tests=await fetchTests(); const idx=tests.findIndex(t=>t.id===currentTestId); if(idx!==-1){ tests[idx].questions=tests[idx].questions.filter(q=>q.id!==b.dataset.qid); await saveTests(tests); currentTest=tests[idx]; renderQuestions(); } } }));
    }
    document.getElementById('createNewQuestionBtn').addEventListener('click',()=>location.href=`edit-question.html?testId=${currentTestId}&mode=new`);
    document.getElementById('manageTestBtn').addEventListener('click',()=>location.href=`manage-test.html?testId=${currentTestId}`);
    document.getElementById('editTitleBtn').addEventListener('click',async()=>{
        let newTitle=prompt('Новое название теста',currentTest.title);
        if(newTitle && newTitle.trim()){
            let tests=await fetchTests();
            const idx=tests.findIndex(t=>t.id===currentTestId);
            if(idx!==-1){ tests[idx].title=newTitle.trim(); await saveTests(tests); currentTest=tests[idx]; document.getElementById('testTitle').innerText=escapeHtml(currentTest.title); }
        }
    });
    // Добавление из базы
    const modal=document.getElementById('taskModal');
    document.getElementById('addFromBaseBtn').addEventListener('click',async()=>{
        const tasks=await fetchTasksBase();
        const container=document.getElementById('tasksListModal');
        if(!tasks.length) container.innerHTML='<p>Нет заданий в базе.</p>';
        else {
            container.innerHTML=tasks.map((t,idx)=>`<div class="task-item" data-idx="${idx}"><strong>${escapeHtml(t.title)}</strong><br>Вариантов: ${t.answerOptions?.length||0}</div>`).join('');
            document.querySelectorAll('.task-item').forEach(el=>el.addEventListener('click',async()=>{
                const idx=parseInt(el.dataset.idx);
                const task=tasks[idx];
                if(confirm(`Добавить задание "${task.title}" в тест?`)){
                    const newQuestion={
                        id:'q_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),
                        titleQuestion:task.title,
                        editorData:task.editorData,
                        answers:task.answers,
                        answerOptions:task.answerOptions,
                        correctIndices:task.correctIndices,
                        requireFileAttachment:task.requireFileAttachment||false,
                        hasEditorContent:true
                    };
                    let tests=await fetchTests();
                    const testIdx=tests.findIndex(t=>t.id===currentTestId);
                    if(testIdx!==-1){
                        if(!tests[testIdx].questions) tests[testIdx].questions=[];
                        tests[testIdx].questions.push(newQuestion);
                        await saveTests(tests);
                        currentTest=tests[testIdx];
                        renderQuestions();
                        modal.style.display='none';
                    }
                }
            }));
        }
        modal.style.display='flex';
    });
    document.getElementById('closeTaskModal').addEventListener('click',()=>modal.style.display='none');
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    loadTest();
</script>
</body>
</html>
