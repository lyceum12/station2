<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Управление вопросами</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;padding:2rem 1.5rem;min-height:100vh;}
        .container{max-width:1100px;margin:0 auto;}
        .back-link{display:inline-flex;align-items:center;gap:6px;background:white;padding:0.5rem 1rem;border-radius:40px;text-decoration:none;color:#1e293b;margin-bottom:1.5rem;border:1px solid #e2e8f0;}
        .header-info{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:2rem;gap:1rem;}
        .test-title-text{font-size:1.8rem;font-weight:700;color:#0f172a;}
        .edit-title-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0.3rem 0.6rem;border-radius:30px;color:#64748b;}
        .edit-title-btn:hover{background:#e2e8f0;color:#3b82f6;}
        .title-edit-form{display:flex;gap:10px;align-items:center;}
        .title-input{padding:0.5rem 1rem;font-size:1.3rem;border:2px solid #3b82f6;border-radius:40px;outline:none;font-weight:600;}
        .test-badge{background:#e2e8f0;padding:0.3rem 0.9rem;border-radius:30px;font-size:0.85rem;}
        .btn{border:none;padding:0.6rem 1.4rem;border-radius:40px;font-weight:600;cursor:pointer;font-size:0.9rem;transition:0.2s;}
        .btn-primary{background:#3b82f6;color:white;}
        .btn-outline{background:white;border:1px solid #cbd5e1;}
        .btn-outline:hover{background:#f1f5f9;}
        .btn-sm{padding:0.4rem 1rem;font-size:0.8rem;}
        .btn-success{background:#10b981;color:white;}
        .btn-danger{background:#fee2e2;color:#b91c1c;}
        .questions-grid{display:flex;flex-direction:column;gap:1rem;}
        .question-card{background:white;border-radius:24px;padding:1.2rem 1.5rem;border:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;cursor:grab;}
        .question-card:active{cursor:grabbing;}
        .question-preview{flex:1;}
        .question-preview h3{font-size:1.1rem;font-weight:600;margin-bottom:6px;}
        .question-meta{font-size:0.75rem;color:#475569;display:flex;gap:12px;flex-wrap:wrap;}
        .empty-questions{background:white;border-radius:2rem;padding:3rem;text-align:center;color:#64748b;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:white;border-radius:32px;padding:2rem;max-width:400px;width:90%;}
        .modal-content input{width:100%;padding:0.8rem;margin:1rem 0;border:1px solid #cbd5e1;border-radius:40px;}
        .task-item{border:1px solid #e2e8f0;border-radius:16px;padding:0.8rem;margin-bottom:0.8rem;cursor:pointer;}
        .task-item:hover{background:#f8fafc;}
        .toast-message{position:fixed;bottom:20px;right:20px;color:white;padding:12px 20px;border-radius:40px;z-index:1000;}
        .file-upload-label{background:#e2e8f0;padding:0.6rem 1.4rem;border-radius:40px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
        .file-upload-label:hover{background:#cbd5e1;}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <div class="header-info">
        <div><div id="testTitleContainer"></div><div class="test-badge" id="testIdBadge"></div></div>
        <div>
            <button class="btn btn-outline" id="manageTestBtn">Управление тестом</button>
            <button class="btn btn-outline" id="addFromBaseBtn">Добавить из базы</button>
            <label class="file-upload-label" id="uploadHtmlBtn">📄 Загрузить HTML<input type="file" id="htmlFileInput" accept=".html, .htm" style="display:none;"></label>
            <button class="btn btn-primary" id="createNewQuestionBtn">Создать вопрос</button>
        </div>
    </div>
    <div id="questionsListContainer" class="questions-grid"></div>
    <footer>Перетаскивайте вопросы для изменения порядка. Нажмите на номер вопроса, чтобы изменить его позицию.</footer>
</div>
<div id="taskModal" class="modal"><div class="modal-content"><h3>Выберите задание из базы</h3><div id="tasksListModal"></div><button id="closeTaskModal" class="btn" style="margin-top:1rem;">Закрыть</button></div></div>
<div id="changeNumberModal" class="modal"><div class="modal-content"><h3>Изменение номера вопроса</h3><p>Введите новый номер вопроса (от 1 до <span id="maxNumber"></span>)</p><input type="number" id="newNumberInput" min="1"><div class="modal-buttons" style="margin-top:1rem;"><button id="cancelNumberBtn" class="btn">Отмена</button><button id="saveNumberBtn" class="btn btn-primary">Переместить</button></div></div></div>
<script>
    let currentTestId=null, currentTest=null, isEditingTitle=false;
    let movingQuestionId = null;
    async function checkAuth() {
        const res = await fetch('/api/check-session');
        const data = await res.json();
        if (!data.authenticated) { window.location.href = 'index.html'; return false; }
        return true;
    }
    async function fetchTests(){const r=await fetch('/api/tests');return r.json();}
    async function saveTests(t){await fetch('/api/tests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(t)});}
    async function loadTestFromUrl(){
        const params=new URLSearchParams(location.search);
        currentTestId=params.get('testId');
        if(!currentTestId){document.getElementById('testTitleContainer').innerHTML='<span style="color:red">Ошибка: тест не указан</span>';return null;}
        const tests=await fetchTests();
        const test=tests.find(t=>t.id===currentTestId);
        if(!test){document.getElementById('testTitleContainer').innerHTML='<span style="color:red">Тест не найден</span>';return null;}
        currentTest=test;
        renderTestTitle();
        document.getElementById('testIdBadge').innerText=`ID: ${test.id.slice(0,8)}`;
        renderQuestionsList();
        return test;
    }
    function renderTestTitle(){
        const container=document.getElementById('testTitleContainer');
        if(!currentTest)return;
        if(isEditingTitle){
            container.innerHTML=`<div class="title-edit-form"><input type="text" id="editTitleInput" class="title-input" value="${escapeHtml(currentTest.title)}" autofocus><button class="btn btn-success btn-sm" id="saveTitleBtn">Сохранить</button><button class="btn btn-outline btn-sm" id="cancelTitleBtn">Отмена</button></div>`;
            document.getElementById('saveTitleBtn').addEventListener('click',async()=>{const newTitle=document.getElementById('editTitleInput').value.trim();if(!newTitle){showToast("Название не может быть пустым",true);return;}let tests=await fetchTests();const idx=tests.findIndex(t=>t.id===currentTestId);if(idx!==-1){tests[idx].title=newTitle;await saveTests(tests);currentTest=tests[idx];showToast("Название обновлено");isEditingTitle=false;renderTestTitle();}});
            document.getElementById('cancelTitleBtn').addEventListener('click',()=>{isEditingTitle=false;renderTestTitle();});
        }else{
            container.innerHTML=`<div class="test-title-display"><span class="test-title-text">${escapeHtml(currentTest.title)}</span><button class="edit-title-btn" id="editTitleBtn">Редактировать</button></div>`;
            document.getElementById('editTitleBtn')?.addEventListener('click',()=>{isEditingTitle=true;renderTestTitle();});
        }
    }
    async function renderQuestionsList(){
        const container=document.getElementById('questionsListContainer');
        if(!currentTest){container.innerHTML='<div class="empty-questions">Тест не загружен</div>';return;}
        const qs=currentTest.questions||[];
        if(!qs.length){container.innerHTML='<div class="empty-questions">В этом тесте пока нет вопросов.</div>';return;}
        container.innerHTML=qs.map((q,idx)=>`<div class="question-card" data-qid="${q.id}"><div class="question-preview"><h3>${escapeHtml(q.titleQuestion||"Без заголовка")}</h3><div class="question-meta"><span>Вопрос #${idx+1}</span><span>Баллы: ${q.points||1}</span><span>Правильных ответов: ${(q.correctIndices?.length||q.answers?.filter(a=>a.isCorrect).length||0)}</span><span>${q.requireFileAttachment?'📎 Требует файл':'📄 Без файла'}</span>${q.attachments && q.attachments.length ? `<span>📁 Файлов: ${q.attachments.length}</span>` : ''}</div></div><div><button class="btn btn-outline btn-sm edit-question" data-qid="${q.id}">Редактировать</button> <button class="btn btn-outline btn-sm change-number-btn" data-qid="${q.id}" data-current="${idx+1}">Номер</button> <button class="btn btn-danger btn-sm delete-question" data-qid="${q.id}">Удалить</button></div></div>`).join('');
        document.querySelectorAll('.edit-question').forEach(btn=>btn.addEventListener('click',()=>{const qid=btn.dataset.qid;location.href=`edit-question.html?testId=${currentTestId}&questionId=${qid}`;}));
        document.querySelectorAll('.delete-question').forEach(btn=>btn.addEventListener('click',async()=>{if(confirm('Удалить вопрос?')){let tests=await fetchTests();const idx=tests.findIndex(t=>t.id===currentTestId);if(idx!==-1){tests[idx].questions=tests[idx].questions.filter(q=>q.id!==btn.dataset.qid);await saveTests(tests);currentTest=tests[idx];renderQuestionsList();showToast("Вопрос удалён");}}}));
        document.querySelectorAll('.change-number-btn').forEach(btn=>btn.addEventListener('click',(e)=>{
            e.stopPropagation();
            movingQuestionId = btn.dataset.qid;
            document.getElementById('maxNumber').innerText = currentTest.questions.length;
            document.getElementById('newNumberInput').value = btn.dataset.current;
            document.getElementById('changeNumberModal').style.display = 'flex';
        }));
        new Sortable(container, {
            animation:150,
            onEnd:async function(){
                const newOrder=[];
                document.querySelectorAll('.question-card').forEach(card=>newOrder.push(card.getAttribute('data-qid')));
                let tests=await fetchTests();
                const idx=tests.findIndex(t=>t.id===currentTestId);
                if(idx!==-1){
                    const reordered=newOrder.map(id=>tests[idx].questions.find(q=>q.id===id));
                    tests[idx].questions=reordered;
                    await saveTests(tests);
                    currentTest=tests[idx];
                    renderQuestionsList();
                    showToast('Порядок вопросов сохранён');
                }
            }
        });
    }
    async function changeQuestionNumber(questionId, newPosition) {
        let tests = await fetchTests();
        const testIdx = tests.findIndex(t => t.id === currentTestId);
        if (testIdx === -1) return;
        const questions = tests[testIdx].questions;
        const oldIndex = questions.findIndex(q => q.id === questionId);
        if (oldIndex === -1) return;
        const newIndex = newPosition - 1;
        if (newIndex < 0 || newIndex >= questions.length) return;
        if (oldIndex === newIndex) return;
        const [moved] = questions.splice(oldIndex, 1);
        questions.splice(newIndex, 0, moved);
        await saveTests(tests);
        currentTest = tests[testIdx];
        renderQuestionsList();
        showToast(`Вопрос перемещён на позицию ${newPosition}`);
    }
    function showToast(msg,isError=false){const t=document.createElement('div');t.className='toast-message';t.style.background=isError?'#ef4444':'#10b981';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
    document.getElementById('createNewQuestionBtn').addEventListener('click',()=>{if(currentTestId)location.href=`edit-question.html?testId=${currentTestId}&mode=new`;});
    document.getElementById('manageTestBtn').addEventListener('click',()=>{if(currentTestId)location.href=`manage-test.html?testId=${currentTestId}`;});
    const modal=document.getElementById('taskModal');
    document.getElementById('addFromBaseBtn').addEventListener('click',async()=>{
        const tasksRes=await fetch('/api/tasks-base');
        const tasks=await tasksRes.json();
        const container=document.getElementById('tasksListModal');
        if(!tasks.length)container.innerHTML='<p>Нет заданий в базе.</p>';
        else{
            container.innerHTML=tasks.map((t,idx)=>`<div class="task-item" data-idx="${idx}"><strong>${escapeHtml(t.title)}</strong><br><span style="font-size:0.8rem;">Вариантов: ${t.answerOptions?.length||0} | Баллов: ${t.points||1}</span></div>`).join('');
            document.querySelectorAll('.task-item').forEach(el=>el.addEventListener('click',async()=>{
                const idx=parseInt(el.dataset.idx);
                const task=tasks[idx];
                if(confirm(`Добавить задание "${task.title}" в тест?`)){
                    const newQuestion={id:'q_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),titleQuestion:task.title,points:task.points||1,editorData:task.editorData,answers:task.answers,answerOptions:task.answerOptions,correctIndices:task.correctIndices,requireFileAttachment:task.requireFileAttachment||false,attachments:task.attachments||[],hasEditorContent:true};
                    let tests=await fetchTests();
                    const testIdx=tests.findIndex(t=>t.id===currentTestId);
                    if(testIdx!==-1){if(!tests[testIdx].questions)tests[testIdx].questions=[];tests[testIdx].questions.push(newQuestion);await saveTests(tests);currentTest=tests[testIdx];renderQuestionsList();showToast("Задание добавлено из базы");modal.style.display='none';}
                }
            }));
        }
        modal.style.display='flex';
    });
    document.getElementById('closeTaskModal').addEventListener('click',()=>{modal.style.display='none';});
    const numberModal = document.getElementById('changeNumberModal');
    document.getElementById('cancelNumberBtn').addEventListener('click', () => { numberModal.style.display = 'none'; movingQuestionId = null; });
    document.getElementById('saveNumberBtn').addEventListener('click', async () => {
        const newPos = parseInt(document.getElementById('newNumberInput').value);
        if (isNaN(newPos) || newPos < 1 || newPos > currentTest.questions.length) {
            showToast('Некорректный номер', true);
            return;
        }
        await changeQuestionNumber(movingQuestionId, newPos);
        numberModal.style.display = 'none';
        movingQuestionId = null;
    });
    checkAuth().then(ok => { if(ok) loadTestFromUrl(); });
</script>
</body>
</html>
