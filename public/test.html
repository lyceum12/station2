<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>Станция тестирования</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body{background:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw;display:flex;justify-content:center;align-items:center;}
        .app-window{width:100%;height:100%;background:#fff;display:flex;flex-direction:column;overflow:hidden;}
        .top-bar{background:#1E325A;height:61px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
        .timer-box{display:flex;align-items:center;gap:8px;}
        .timer-icon{background:#fff;border-radius:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#087475;}
        .timer{font-weight:800;font-size:24px;color:#087475;background:#fff;padding:4px 12px;border-radius:28px;}
        .kim-info{font-size:20px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .top-actions{display:flex;gap:12px;margin-left:auto;}
        .finish-btn{background:#10b981;color:white;padding:8px 16px;border-radius:40px;font-weight:600;border:none;cursor:pointer;}
        .stats-panel{background:#e7edf9;padding:5px 20px;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid #E2E8F0;position:relative;flex-shrink:0;}
        .stats-label{font-size:16px;font-weight:500;}
        .stats-count{font-size:24px;font-weight:800;}
        .questions-nav{position:absolute;left:50%;transform:translateX(-50%);top:-12px;z-index:25;background:#F8FAFC;padding:5px;border-bottom:1px solid #CBD5E1;overflow-x:auto;white-space:nowrap;max-width:60%;}
        .buttons-wrapper{display:inline-flex;gap:8px;}
        .q-btn{width:42px;height:24px;border:none;border-radius:6px;cursor:pointer;background:#F0F0F0;font-weight:700;font-size:14px;}
        .q-btn.answered{background:#C0C0C0;}
        .q-btn.current{background:#FFD7CC;box-shadow:0 0 0 2px #FF8A5C;}
        .content-area{flex:1;padding:16px 20px;overflow-y:auto;}
        .question-html{font-family:'Segoe UI',sans-serif;font-size:1rem;line-height:1.5;}
        .question-html img{max-width:100%;}
        .file-bar{background:#1E325A;padding:0 20px;display:flex;align-items:center;gap:16px;min-height:48px;flex-shrink:0;flex-wrap:wrap;}
        .file-action-btn{background:#F0F0F0;border:none;padding:6px 8px;cursor:pointer;font-weight:600;}
        .answer-area{background:#fff;padding:12px 20px 20px;border-top:1px solid #D7DDD9;flex-shrink:0;}
        .answer-textbox{width:100%;min-height:120px;padding:16px;font-size:20px;border:1px solid #aaa;border-radius:12px;resize:vertical;}
        .login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:2000;}
        .login-card{background:white;border-radius:32px;padding:2rem;width:400px;max-width:90%;text-align:center;}
        .login-card input{width:100%;padding:0.8rem;margin:1rem 0;border:1px solid #ccc;border-radius:40px;}
        .error-msg{color:red;}
        .file-list{margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;}
        .file-item{background:#f1f5f9;border-radius:20px;padding:4px 8px;display:inline-flex;align-items:center;gap:6px;}
        .results-container{padding:2rem;overflow-y:auto;height:100%;}
        .result-card{background:white;border-radius:24px;padding:1rem;margin-bottom:1rem;border:1px solid #e2e8f0;}
        .result-correct{color:#10b981;font-weight:bold;}
        .result-incorrect{color:#ef4444;font-weight:bold;}
        @media (max-width:768px){.timer{font-size:18px;}.kim-info{font-size:14px;}.q-btn{width:32px;font-size:11px;}.answer-textbox{min-height:80px;}}
    </style>
</head>
<body><div class="app-window" id="appWindow"></div></body>
<script>
    let currentSessionId=null, currentTest=null, questionsOrder=[], currentIndex=0, timerInterval=null, finished=false, sessionAnswers={};
    async function fetchJson(url, options={}) {
        const res = await fetch(url, {...options, headers:{'Content-Type':'application/json'}});
        if(!res.ok) throw new Error(await res.text());
        return res.json();
    }
    async function getSessions(){return await fetchJson('/api/sessions');}
    async function saveSessions(s){await fetchJson('/api/sessions',{method:'POST',body:JSON.stringify(s)});}
    async function getTests(){return await fetchJson('/api/tests');}
    async function startSession(testId, regNumber, studentName){
        let sessions=await getSessions();
        const tests=await getTests();
        const test=tests.find(t=>t.id===testId);
        if(!test) throw new Error('Тест не найден');
        const shuffledIds=[...test.questions||[]].sort(()=>Math.random()-0.5).map(q=>q.id);
        const endTime=Date.now()+(test.timeLimitMinutes||60)*60*1000;
        const sessionId='sess_'+Date.now()+'_'+Math.random().toString(36).substr(2,8);
        const session={id:sessionId,testId,studentRegNumber:regNumber,studentName,startTime:Date.now(),endTimestamp:endTime,questionsOrder:shuffledIds,currentIndex:0,answers:{}};
        sessions.push(session);
        await saveSessions(sessions);
        return {sessionId,endTimestamp:endTime,questionsOrder:shuffledIds};
    }
    async function loadSession(){
        const sid=localStorage.getItem('quiz_session_id');
        if(!sid) return null;
        const sessions=await getSessions();
        const session=sessions.find(s=>s.id===sid);
        if(!session){localStorage.removeItem('quiz_session_id');return null;}
        return session;
    }
    async function updateSession(answers, idx){
        if(!currentSessionId) return;
        let sessions=await getSessions();
        const sIdx=sessions.findIndex(s=>s.id===currentSessionId);
        if(sIdx!==-1){
            if(answers) sessions[sIdx].answers={...sessions[sIdx].answers,...answers};
            if(idx!==undefined) sessions[sIdx].currentIndex=idx;
            await saveSessions(sessions);
        }
    }
    async function finishSession(){
        if(!currentSessionId) return;
        let sessions=await getSessions();
        sessions=sessions.filter(s=>s.id!==currentSessionId);
        await saveSessions(sessions);
        localStorage.removeItem('quiz_session_id');
    }
    async function init(){
        try{
            const session=await loadSession();
            if(session){
                const tests=await getTests();
                currentTest=tests.find(t=>t.id===session.testId);
                if(!currentTest){localStorage.removeItem('quiz_session_id');showLogin();return;}
                questionsOrder=session.questionsOrder;
                currentIndex=session.currentIndex;
                currentSessionId=session.id;
                sessionAnswers=session.answers||{};
                buildUI();
                startTimer(session.endTimestamp);
                await renderCurrentQuestion();
                renderNav();
                updateCounter();
            }else showLogin();
        }catch(e){console.error(e);showLogin();}
    }
    function showLogin(){
        document.getElementById('appWindow').innerHTML=`<div class="login-overlay"><div class="login-card"><h2>Вход в тестирование</h2><p>Введите код участника</p><input type="text" id="regCode" placeholder="Код участника"><button id="loginBtn" style="background:#1E325A;color:white;padding:0.6rem 2rem;border:none;border-radius:40px;">Войти</button><div id="loginError" class="error-msg"></div></div></div>`;
        document.getElementById('loginBtn').onclick=async()=>{
            const code=document.getElementById('regCode').value.trim();
            if(!code){document.getElementById('loginError').innerText='Введите код';return;}
            const tests=await getTests();
            let foundTest=null, foundStudent=null;
            for(let t of tests){const s=(t.students||[]).find(st=>st.registrationNumber===code);if(s){foundTest=t;foundStudent=s;break;}}
            if(!foundTest){document.getElementById('loginError').innerText='Код не найден';return;}
            try{
                const data=await startSession(foundTest.id,code,foundStudent.fullName);
                currentTest=foundTest;
                questionsOrder=data.questionsOrder;
                currentIndex=0;
                currentSessionId=data.sessionId;
                sessionAnswers={};
                localStorage.setItem('quiz_session_id',currentSessionId);
                localStorage.setItem('quiz_session_student_reg',code);
                localStorage.setItem('quiz_session_student_name',foundStudent.fullName);
                buildUI();
                startTimer(data.endTimestamp);
                await renderCurrentQuestion();
                renderNav();
                updateCounter();
            }catch(e){document.getElementById('loginError').innerText=e.message;}
        };
    }
    function buildUI(){
        const app=document.getElementById('appWindow');
        app.innerHTML=`
            <div class="top-bar"><div class="timer-box"><div class="timer-icon">⏱️</div><div class="timer" id="timerDisplay">--:--</div></div><div class="kim-info">${escapeHtml(currentTest.title)}</div><div style="margin-left:auto;display:flex;gap:12px;"><button id="prevBtn" style="background:#E2E8F0;border:none;padding:8px;border-radius:50%;"><svg width="24" height="24" fill="#6d899f" viewBox="0 0 16 16"><path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/></svg></button><button id="nextBtn" style="background:#E2E8F0;border:none;padding:8px;border-radius:50%;"><svg width="24" height="24" fill="#6d899f" viewBox="0 0 16 16"><path d="M0 14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2zm4.5-6.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5a.5.5 0 0 1 0-1"/></svg></button></div><div class="top-actions"><button class="finish-btn" id="finishBtn">Завершить тестирование</button></div></div>
            <div class="stats-panel"><span class="stats-label">Дано ответов:</span><span class="stats-count" id="answerCounter">0/${questionsOrder.length}</span><div class="questions-nav" id="questionsNav"><div class="buttons-wrapper" id="buttonsContainer"></div></div><div style="position:absolute;right:90px;top:-12px;"><button id="zoomInBtn" style="background:none;border:none;"><svg width="36" height="36" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11M13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0"/><path d="M10.344 11.742q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1 6.5 6.5 0 0 1-1.398 1.4z"/><path fill-rule="evenodd" d="M6.5 3a.5.5 0 0 1 .5.5V6h2.5a.5.5 0 0 1 0 1H7v2.5a.5.5 0 0 1-1 0V7H3.5a.5.5 0 0 1 0-1H6V3.5a.5.5 0 0 1 .5-.5"/></svg></button><button id="zoomOutBtn" style="background:none;border:none;"><svg width="36" height="36" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11M13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0"/><path d="M10.344 11.742q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1 6.5 6.5 0 0 1-1.398 1.4z"/><path fill-rule="evenodd" d="M3 6.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5"/></svg></button></div></div>
            <div class="content-area"><div id="questionContent" class="question-html"></div></div>
            <div class="file-bar" id="fileBar"></div>
            <div class="answer-area"><textarea id="answerInput" class="answer-textbox" placeholder="Введите ответ..."></textarea></div>
        `;
        document.getElementById('prevBtn').onclick=()=>changeQuestion(-1);
        document.getElementById('nextBtn').onclick=()=>changeQuestion(1);
        document.getElementById('finishBtn').onclick=()=>finish(false);
        document.getElementById('zoomInBtn').onclick=()=>changeFontSize(1);
        document.getElementById('zoomOutBtn').onclick=()=>changeFontSize(-1);
        document.getElementById('answerInput').oninput=saveCurrentAnswer;
        window.zoomTarget=document.getElementById('questionContent');
    }
    async function saveCurrentAnswer(){
        const qid=questionsOrder[currentIndex];
        const text=document.getElementById('answerInput').value;
        if(!sessionAnswers[qid]) sessionAnswers[qid]={text:'',files:[]};
        sessionAnswers[qid].text=text;
        await updateSession({[qid]:sessionAnswers[qid]}, currentIndex);
        renderNav();
        updateCounter();
    }
    async function renderCurrentQuestion(){
        const qid=questionsOrder[currentIndex];
        const q=currentTest.questions.find(qq=>qq.id===qid);
        if(!q) return;
        let html='';
        if(q.editorData?.blocks){
            for(let b of q.editorData.blocks){
                if(b.type==='paragraph') html+=`<p>${b.data.text}</p>`;
                else if(b.type==='header') html+=`<h${b.data.level}>${b.data.text}</h${b.data.level}>`;
                else if(b.type==='list'){const tag=b.data.style==='ordered'?'ol':'ul';html+=`<${tag}>`;for(let i of b.data.items)html+=`<li>${i}</li>`;html+=`</${tag}>`;}
                else if(b.type==='image') html+=`<img src="${b.data.file.url}" alt="${b.data.caption||''}">`;
                else html+=`<div>${JSON.stringify(b.data)}</div>`;
            }
        } else html='<p>Нет содержимого</p>';
        document.getElementById('questionContent').innerHTML=html;
        const ans=sessionAnswers[qid]||{text:'',files:[]};
        document.getElementById('answerInput').value=ans.text;
        renderFileBar(q);
    }
    async function renderFileBar(q){
        const bar=document.getElementById('fileBar');
        if(q.requireFileAttachment){
            bar.innerHTML=`<div><button id="attachFileBtn" class="file-action-btn">Прикрепить файл</button></div><div id="fileList"></div>`;
            document.getElementById('attachFileBtn').onclick=()=>{
                const input=document.createElement('input');input.type='file';
                input.onchange=async e=>{
                    const file=e.target.files[0];
                    if(file){
                        const reader=new FileReader();
                        reader.onload=async ev=>{
                            const dataURL=ev.target.result;
                            const qid=questionsOrder[currentIndex];
                            if(!sessionAnswers[qid]) sessionAnswers[qid]={text:'',files:[]};
                            sessionAnswers[qid].files.push({name:file.name,type:file.type,dataURL});
                            await updateSession({[qid]:sessionAnswers[qid]}, currentIndex);
                            renderFileBar(q);
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            };
            const files=sessionAnswers[questionsOrder[currentIndex]]?.files||[];
            const fl=document.getElementById('fileList');
            if(files.length) fl.innerHTML=files.map((f,idx)=>`<div class="file-item">${escapeHtml(f.name)} <button data-idx="${idx}" class="remove-file" style="background:none;border:none;">❌</button></div>`).join('');
            else fl.innerHTML='<span>Нет файлов</span>';
            document.querySelectorAll('.remove-file').forEach(btn=>btn.onclick=async()=>{
                const idx=parseInt(btn.dataset.idx);
                const qid=questionsOrder[currentIndex];
                sessionAnswers[qid].files.splice(idx,1);
                await updateSession({[qid]:sessionAnswers[qid]}, currentIndex);
                renderFileBar(q);
            });
        } else bar.innerHTML='<div style="color:white;padding:8px;">Файлы не требуются</div>';
    }
    function renderNav(){
        const container=document.getElementById('buttonsContainer');
        let html='';
        for(let i=0;i<questionsOrder.length;i++){
            const qid=questionsOrder[i];
            const answered=sessionAnswers[qid] && (sessionAnswers[qid].text.trim()!=='' || (sessionAnswers[qid].files?.length));
            html+=`<button class="q-btn ${i===currentIndex?'current':''} ${answered?'answered':''}" data-idx="${i}">${i+1}</button>`;
        }
        container.innerHTML=html;
        document.querySelectorAll('.q-btn').forEach(btn=>btn.onclick=()=>{saveCurrentAnswer();currentIndex=parseInt(btn.dataset.idx);renderCurrentQuestion();renderNav();updateCounter();});
    }
    function updateCounter(){
        let cnt=0;
        for(let qid of questionsOrder) if(sessionAnswers[qid] && (sessionAnswers[qid].text.trim()!=='' || sessionAnswers[qid].files?.length)) cnt++;
        document.getElementById('answerCounter').innerText=`${cnt}/${questionsOrder.length}`;
    }
    function changeQuestion(delta){
        saveCurrentAnswer();
        const ni=currentIndex+delta;
        if(ni>=0 && ni<questionsOrder.length){currentIndex=ni;renderCurrentQuestion();renderNav();updateCounter();}
    }
    function changeFontSize(delta){
        const cur=parseFloat(getComputedStyle(window.zoomTarget).fontSize);
        let n=cur+delta;
        if(n<10)n=10;if(n>32)n=32;
        window.zoomTarget.style.fontSize=n+'px';
    }
    function startTimer(endTime){
        if(timerInterval) clearInterval(timerInterval);
        const update=()=>{
            const rem=Math.max(0,endTime-Date.now());
            const m=Math.floor(rem/60000), s=Math.floor((rem%60000)/1000);
            document.getElementById('timerDisplay').innerText=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(rem<=0){clearInterval(timerInterval);finish(true);}
        };
        update();
        timerInterval=setInterval(update,1000);
    }
    async function finish(forced){
        if(finished) return;
        if(timerInterval) clearInterval(timerInterval);
        await saveCurrentAnswer();
        let tests=await getTests();
        const testIdx=tests.findIndex(t=>t.id===currentTest.id);
        if(testIdx!==-1){
            const answersArray=[];
            for(let qid of questionsOrder){
                const ans=sessionAnswers[qid]||{text:'',files:[]};
                answersArray.push({questionId:qid,answerText:ans.text,files:ans.files});
            }
            const result={studentRegNumber:localStorage.getItem('quiz_session_student_reg')||'',studentName:localStorage.getItem('quiz_session_student_name')||'',finishedAt:Date.now(),answers:answersArray};
            if(!tests[testIdx].results) tests[testIdx].results=[];
            tests[testIdx].results.push(result);
            await fetchJson('/api/tests',{method:'POST',body:JSON.stringify(tests)});
        }
        await finishSession();
        finished=true;
        const resultsPage=await buildResultsPage();
        document.getElementById('appWindow').innerHTML=resultsPage;
        document.getElementById('restartBtn')?.addEventListener('click',()=>location.reload());
    }
    async function buildResultsPage(){
        const showDetails=currentTest.showCorrectAnswersAfterTest||false;
        const questions=currentTest.questions||[];
        let correctCount=0, details=[];
        for(let i=0;i<questions.length;i++){
            const q=questions[i];
            const userAns=sessionAnswers[q.id];
            const userText=userAns?.text||'(нет ответа)';
            let correctIndices=q.correctIndices||q.answers?.reduce((arr,a,idx)=>{if(a.isCorrect)arr.push(idx);return arr},[]);
            const correctOpts=(q.answerOptions||[]).filter((_,idx)=>correctIndices.includes(idx)).join(', ');
            let isCorrect=false;
            if(userAns){
                const opts=q.answerOptions||[];
                const userLow=userAns.text.trim().toLowerCase();
                const sel=[];
                for(let j=0;j<opts.length;j++) if(opts[j].toLowerCase()===userLow) sel.push(j);
                isCorrect=sel.length===correctIndices.length && sel.every(idx=>correctIndices.includes(idx));
            }
            if(isCorrect) correctCount++;
            details.push({title:q.titleQuestion,userAnswer:userText,correctAnswer:correctOpts,isCorrect});
        }
        const total=questions.length, percent=Math.round((correctCount/total)*100);
        let html=`<div class="results-container"><h1>Результаты тестирования</h1><p><strong>Ученик:</strong> ${escapeHtml(currentTest.students?.find(s=>s.registrationNumber===localStorage.getItem('quiz_session_student_reg'))?.fullName||'')}</p><p><strong>Ваш результат:</strong> ${correctCount} из ${total} (${percent}%)</p><hr>`;
        if(showDetails){
            html+=`<h2>Разбор вопросов</h2>`;
            for(let i=0;i<details.length;i++){
                const d=details[i];
                const cls=d.isCorrect?'result-correct':'result-incorrect';
                const txt=d.isCorrect?'Верно':'Неверно';
                html+=`<div class="result-card"><strong>Вопрос ${i+1}: ${escapeHtml(d.title)}</strong><br>Ваш ответ: ${escapeHtml(d.userAnswer)}<br>Правильный ответ: ${escapeHtml(d.correctAnswer)}<br><span class="${cls}">${txt}</span></div>`;
            }
        } else html+=`<p>Показ правильных ответов отключён учителем.</p>`;
        html+=`<button id="restartBtn" style="margin-top:2rem;background:#3b82f6;color:white;border:none;padding:0.8rem 2rem;border-radius:40px;">Завершить</button></div>`;
        return html;
    }
    function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
    init();
</script>
</body>
</html>
