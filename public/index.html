<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест-конструктор | Панель учителя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Форма входа */
        .login-container {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .login-container h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
        }
        .login-container button {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 1rem;
        }

        /* Панель администратора */
        .admin-panel {
            display: none;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Строка с кнопками пользователя (справа) */
        .user-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        /* Строка с основными кнопками управления */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .action-bar h1 {
            font-size: 1.9rem;
            color: #0f172a;
        }
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        /* Общие стили кнопок */
        .btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-outline:hover {
            background: #f8fafc;
        }

        /* Список тестов */
        .test-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .test-card {
            background: white;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .test-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }
        .test-info p {
            color: #475569;
            font-size: 0.85rem;
        }
        .test-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Секция суперадмина */
        .super-section {
            background: white;
            border-radius: 32px;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .super-section h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        .super-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            .admin-panel { padding: 1rem; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .action-buttons { justify-content: center; }
            .test-card { flex-direction: column; align-items: stretch; }
            .test-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- Форма входа -->
    <div class="login-container" id="loginContainer">
        <h1>Вход в панель учителя</h1>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="loginBtn">Войти</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <!-- Панель администратора -->
    <div class="admin-panel" id="adminPanel">
        <!-- Верхняя строка с кнопками пользователя (справа) -->
        <div class="user-bar">
            <button id="changePwdBtn" class="btn">Сменить пароль</button>
            <button id="logoutBtn" class="btn">Выйти</button>
        </div>

        <!-- Строка с заголовком и основными кнопками -->
        <div class="action-bar">
            <h1>Библиотека тестов</h1>
            <div class="action-buttons">
                <button id="manageUsersBtn" class="btn">Управление пользователями</button>
                <button id="manageTasksBaseBtn" class="btn">База заданий</button>
                <button id="createTestBtn" class="btn btn-primary">Создать новый тест</button>
            </div>
        </div>

        <!-- Список тестов -->
        <div id="testsList" class="test-list"></div>

        <!-- Панель суперадминистратора -->
        <div id="superAdminPanel" class="super-section" style="display: none;">
            <h2>Администрирование</h2>
            <div class="super-buttons">
                <button id="manageAdminsBtn" class="btn">Управление администраторами</button>
                <button id="viewLogsBtn" class="btn">Просмотр логов</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно смены пароля -->
    <div id="changePwdModal" class="modal">
        <div class="modal-content">
            <h3>Смена пароля</h3>
            <input type="password" id="oldPwd" placeholder="Старый пароль">
            <input type="password" id="newPwd" placeholder="Новый пароль">
            <input type="password" id="confirmPwd" placeholder="Подтверждение">
            <div class="modal-buttons">
                <button id="cancelPwdBtn" class="btn">Отмена</button>
                <button id="savePwdBtn" class="btn btn-primary">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let currentRole = null;

        async function fetchJson(url, options) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function checkSession() {
            try {
                const res = await fetch('/api/check-session');
                const data = await res.json();
                if (data.authenticated) {
                    currentRole = data.role;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    if (currentRole === 'super_admin') {
                        document.getElementById('superAdminPanel').style.display = 'block';
                    } else {
                        document.getElementById('superAdminPanel').style.display = 'none';
                    }
                    loadTests();
                } else {
                    document.getElementById('loginContainer').style.display = 'block';
                    document.getElementById('adminPanel').style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
            }
        }

        async function loadTests() {
            const tests = await fetchJson('/api/tests', { method: 'GET' });
            const container = document.getElementById('testsList');
            if (!tests.length) {
                container.innerHTML = '<div class="test-card">Нет тестов. Создайте первый.</div>';
                return;
            }
            container.innerHTML = tests.map(test => `
                <div class="test-card">
                    <div class="test-info">
                        <h3>${escapeHtml(test.title)}</h3>
                        <p>Вопросов: ${test.questions?.length || 0} | Время: ${test.timeLimitMinutes || 60} мин</p>
                    </div>
                    <div class="test-actions">
                        <button class="btn edit-questions" data-id="${test.id}">Редактировать вопросы</button>
                        <button class="btn manage-test" data-id="${test.id}">Управление</button>
                        <button class="btn delete-test" data-id="${test.id}">Удалить</button>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.edit-questions').forEach(btn => btn.onclick = () => location.href = `questions.html?testId=${btn.dataset.id}`);
            document.querySelectorAll('.manage-test').forEach(btn => btn.onclick = () => location.href = `manage-test.html?testId=${btn.dataset.id}`);
            document.querySelectorAll('.delete-test').forEach(btn => btn.onclick = async () => {
                if (confirm('Удалить тест?')) {
                    let tests2 = await fetchJson('/api/tests', { method: 'GET' });
                    tests2 = tests2.filter(t => t.id !== btn.dataset.id);
                    await fetchJson('/api/tests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tests2) });
                    loadTests();
                }
            });
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        // Обработчики событий
        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    checkSession();
                } else {
                    document.getElementById('errorMsg').innerText = 'Неверный логин или пароль';
                }
            } catch (e) {
                document.getElementById('errorMsg').innerText = e.message;
            }
        };

        document.getElementById('logoutBtn').onclick = async () => {
            await fetch('/api/logout', { method: 'POST' });
            checkSession();
        };

        document.getElementById('changePwdBtn').onclick = () => {
            document.getElementById('changePwdModal').style.display = 'flex';
        };

        document.getElementById('cancelPwdBtn').onclick = () => {
            document.getElementById('changePwdModal').style.display = 'none';
        };

        document.getElementById('savePwdBtn').onclick = async () => {
            const oldPwd = document.getElementById('oldPwd').value;
            const newPwd = document.getElementById('newPwd').value;
            const confirm = document.getElementById('confirmPwd').value;
            if (newPwd !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            try {
                await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
                });
                alert('Пароль изменён');
                document.getElementById('changePwdModal').style.display = 'none';
            } catch (e) {
                alert(e.message);
            }
        };

        document.getElementById('manageUsersBtn').onclick = () => location.href = 'users.html';
        document.getElementById('manageTasksBaseBtn').onclick = () => location.href = 'tasks-base.html';
        document.getElementById('createTestBtn').onclick = async () => {
            const newId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const newTest = {
                id: newId,
                title: "Новый тест",
                createdAt: new Date().toISOString(),
                timeLimitMinutes: 60,
                students: [],
                results: [],
                questions: [],
                showCorrectAnswersAfterTest: false
            };
            let tests = await fetchJson('/api/tests', { method: 'GET' });
            tests.push(newTest);
            await fetchJson('/api/tests', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tests)
            });
            location.href = `questions.html?testId=${newId}`;
        };
        document.getElementById('manageAdminsBtn').onclick = () => location.href = 'admins.html';
        document.getElementById('viewLogsBtn').onclick = () => location.href = 'logs.html';

        checkSession();
    </script>
</body>
</html>
