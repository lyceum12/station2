<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест-конструктор | Панель учителя</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; }
        body { background:#f1f5f9; padding:2rem 1.5rem; }
        .container { max-width:1200px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:2rem; gap:1rem; }
        h1 { font-size:1.9rem; color:#0f172a; }
        .btn { background:white; border:none; padding:0.6rem 1.3rem; border-radius:40px; font-weight:600; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
        .btn-primary { background:#3b82f6; color:white; }
        .btn-outline { border:1px solid #cbd5e1; background:white; }
        .btn-danger { background:#fee2e2; color:#b91c1c; }
        .test-list { display:flex; flex-direction:column; gap:1rem; }
        .test-card { background:white; border-radius:24px; padding:1.2rem 1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; border:1px solid #e2e8f0; }
        .test-info h3 { font-size:1.3rem; margin-bottom:6px; }
        .test-info p { color:#475569; font-size:0.85rem; }
        .test-actions { display:flex; gap:12px; }
        .empty-state { background:white; border-radius:2rem; padding:3rem; text-align:center; color:#64748b; }
        @media (max-width:640px) { .test-card { flex-direction:column; align-items:flex-start; gap:12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Библиотека тестов</h1>
        <div>
            <button class="btn btn-outline" id="manageUsersBtn">Управление пользователями</button>
            <button class="btn btn-outline" id="manageTasksBaseBtn">База заданий</button>
            <button class="btn btn-primary" id="createTestBtn">Создать новый тест</button>
        </div>
    </div>
    <div id="testsList" class="test-list"></div>
</div>
<script>
    async function fetchTests() { const r=await fetch('/api/tests'); return r.json(); }
    async function saveTests(tests) { await fetch('/api/tests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(tests)}); }
    async function renderTestsList() {
        const tests = await fetchTests();
        const container = document.getElementById('testsList');
        if(!tests.length) { container.innerHTML='<div class="empty-state">Нет тестов. Создайте первый.</div>'; return; }
        container.innerHTML = tests.map(test=>`<div class="test-card"><div class="test-info"><h3>${escapeHtml(test.title)}</h3><p>Вопросов: ${test.questions?.length||0} | Время: ${test.timeLimitMinutes||60} мин</p></div><div class="test-actions"><button class="btn btn-outline edit-questions" data-id="${test.id}">Вопросы</button><button class="btn btn-outline manage-test" data-id="${test.id}">Управление</button><button class="btn btn-danger delete-test" data-id="${test.id}">Удалить</button></div></div>`).join('');
        document.querySelectorAll('.edit-questions').forEach(b=>b.addEventListener('click',()=>window.location.href=`questions.html?testId=${b.dataset.id}`));
        document.querySelectorAll('.manage-test').forEach(b=>b.addEventListener('click',()=>window.location.href=`manage-test.html?testId=${b.dataset.id}`));
        document.querySelectorAll('.delete-test').forEach(b=>b.addEventListener('click',async()=>{ if(confirm('Удалить тест?')){ let tests=await fetchTests(); tests=tests.filter(t=>t.id!==b.dataset.id); await saveTests(tests); renderTestsList(); } }));
    }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    document.getElementById('createTestBtn').addEventListener('click',async()=>{
        const newId='test_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
        const newTest={ id:newId, title:'Новый тест', createdAt:new Date().toISOString(), timeLimitMinutes:60, students:[], results:[], questions:[], showCorrectAnswersAfterTest:false };
        let tests=await fetchTests(); tests.push(newTest); await saveTests(tests); window.location.href=`questions.html?testId=${newId}`;
    });
    document.getElementById('manageUsersBtn').addEventListener('click',()=>window.location.href='users.html');
    document.getElementById('manageTasksBaseBtn').addEventListener('click',()=>window.location.href='tasks-base.html');
    renderTestsList();
</script>
</body>
</html>
