<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест-конструктор | Вход</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .login-container{background:white;border-radius:32px;padding:2rem;width:400px;max-width:90%;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
        h1{font-size:1.8rem;margin-bottom:1.5rem;text-align:center;}
        input{width:100%;padding:0.8rem;margin-bottom:1rem;border:1px solid #cbd5e1;border-radius:40px;}
        button{width:100%;background:#3b82f6;color:white;border:none;padding:0.8rem;border-radius:40px;font-weight:600;cursor:pointer;}
        .error{color:red;text-align:center;margin-top:1rem;}
        .admin-panel{display:none;max-width:1200px;margin:0 auto;padding:2rem;}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
        .btn{background:white;border:1px solid #cbd5e1;padding:0.5rem 1rem;border-radius:40px;cursor:pointer;font-weight:500;}
        .btn-primary{background:#3b82f6;color:white;border:none;}
        .test-card{background:white;border-radius:24px;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
        .toolbar{display:flex;gap:1rem;margin-bottom:1rem;justify-content:flex-end;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:white;border-radius:32px;padding:2rem;max-width:500px;width:90%;}
        table{width:100%;border-collapse:collapse;}
        th,td{border:1px solid #e2e8f0;padding:0.5rem;text-align:left;}
    </style>
</head>
<body>
<div class="login-container" id="loginContainer">
    <h1>Вход в панель учителя</h1>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <button id="loginBtn">Войти</button>
    <div id="errorMsg" class="error"></div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="toolbar">
        <button id="changePwdBtn" class="btn">Сменить пароль</button>
        <button id="logoutBtn" class="btn">Выйти</button>
    </div>
    <div class="header">
        <h1>Библиотека тестов</h1>
        <div>
            <button id="manageUsersBtn" class="btn">Управление пользователями</button>
            <button id="manageTasksBaseBtn" class="btn">База заданий</button>
            <button id="createTestBtn" class="btn btn-primary">Создать новый тест</button>
        </div>
    </div>
    <div id="testsList"></div>
    <div id="superAdminPanel" style="margin-top:2rem; display:none;">
        <h2>Администрирование</h2>
        <button id="manageAdminsBtn" class="btn">Управление администраторами</button>
        <button id="viewLogsBtn" class="btn">Просмотр логов</button>
    </div>
</div>

<!-- Модальное окно смены пароля -->
<div id="changePwdModal" class="modal"><div class="modal-content"><h3>Смена пароля</h3><input type="password" id="oldPwd" placeholder="Старый пароль"><input type="password" id="newPwd" placeholder="Новый пароль"><input type="password" id="confirmPwd" placeholder="Подтверждение"><div style="margin-top:1rem;"><button id="cancelPwdBtn">Отмена</button><button id="savePwdBtn">Сохранить</button></div></div></div>

<script>
    let currentRole = null;
    async function fetchJson(url, options) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }
    async function checkSession() {
        const res = await fetch('/api/check-session');
        const data = await res.json();
        if (data.authenticated) {
            currentRole = data.role;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            if (currentRole === 'super_admin') {
                document.getElementById('superAdminPanel').style.display = 'block';
            } else {
                document.getElementById('superAdminPanel').style.display = 'none';
            }
            loadTests();
        } else {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
    }
    async function loadTests() {
        const tests = await fetchJson('/api/tests', { method: 'GET' });
        const container = document.getElementById('testsList');
        if (!tests.length) { container.innerHTML = '<div class="test-card">Нет тестов. Создайте первый.</div>'; return; }
        container.innerHTML = tests.map(test => `
            <div class="test-card">
                <div><strong>${escapeHtml(test.title)}</strong><br>Вопросов: ${test.questions?.length || 0} | Время: ${test.timeLimitMinutes || 60} мин</div>
                <div><button class="btn edit-questions" data-id="${test.id}">Редактировать вопросы</button> <button class="btn manage-test" data-id="${test.id}">Управление</button> <button class="btn delete-test" data-id="${test.id}">Удалить</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-questions').forEach(btn => btn.onclick = () => location.href = `questions.html?testId=${btn.dataset.id}`);
        document.querySelectorAll('.manage-test').forEach(btn => btn.onclick = () => location.href = `manage-test.html?testId=${btn.dataset.id}`);
        document.querySelectorAll('.delete-test').forEach(btn => btn.onclick = async () => { if(confirm('Удалить тест?')) { let tests2 = await fetchJson('/api/tests', { method: 'GET' }); tests2 = tests2.filter(t => t.id !== btn.dataset.id); await fetchJson('/api/tests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tests2) }); loadTests(); } });
    }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (data.success) {
                checkSession();
            } else {
                document.getElementById('errorMsg').innerText = 'Неверный логин или пароль';
            }
        } catch(e) { document.getElementById('errorMsg').innerText = e.message; }
    };
    document.getElementById('logoutBtn').onclick = async () => { await fetch('/api/logout', { method: 'POST' }); checkSession(); };
    document.getElementById('changePwdBtn').onclick = () => { document.getElementById('changePwdModal').style.display = 'flex'; };
    document.getElementById('cancelPwdBtn').onclick = () => { document.getElementById('changePwdModal').style.display = 'none'; };
    document.getElementById('savePwdBtn').onclick = async () => {
        const oldPwd = document.getElementById('oldPwd').value;
        const newPwd = document.getElementById('newPwd').value;
        const confirm = document.getElementById('confirmPwd').value;
        if (newPwd !== confirm) { alert('Пароли не совпадают'); return; }
        try {
            await fetch('/api/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd }) });
            alert('Пароль изменён');
            document.getElementById('changePwdModal').style.display = 'none';
        } catch(e) { alert(e.message); }
    };
    document.getElementById('manageUsersBtn').onclick = () => location.href = 'users.html';
    document.getElementById('manageTasksBaseBtn').onclick = () => location.href = 'tasks-base.html';
    document.getElementById('createTestBtn').onclick = async () => {
        const newId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
        const newTest = { id: newId, title: "Новый тест", createdAt: new Date().toISOString(), timeLimitMinutes: 60, students: [], results: [], questions: [], showCorrectAnswersAfterTest: false };
        let tests = await fetchJson('/api/tests', { method: 'GET' });
        tests.push(newTest);
        await fetchJson('/api/tests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tests) });
        location.href = `questions.html?testId=${newId}`;
    };
    document.getElementById('manageAdminsBtn').onclick = () => location.href = 'admins.html';
    document.getElementById('viewLogsBtn').onclick = () => location.href = 'logs.html';
    checkSession();
</script>
</body>
</html>
