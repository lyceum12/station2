<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление администраторами</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;padding:2rem 1.5rem;}
        .container{max-width:1000px;margin:0 auto;}
        .back-link{display:inline-flex;align-items:center;gap:6px;background:white;padding:0.5rem 1rem;border-radius:40px;text-decoration:none;color:#1e293b;margin-bottom:1.5rem;border:1px solid #e2e8f0;}
        .btn{border:none;padding:0.5rem 1.2rem;border-radius:40px;font-weight:600;cursor:pointer;background:#e2e8f0;}
        .btn-primary{background:#3b82f6;color:white;}
        .btn-danger{background:#fee2e2;color:#b91c1c;}
        table{width:100%;border-collapse:collapse;margin-top:1rem;}
        th,td{border:1px solid #e2e8f0;padding:0.75rem;text-align:left;}
        th{background:#f8fafc;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:white;border-radius:32px;padding:2rem;max-width:400px;width:90%;}
        .modal-content input{width:100%;padding:0.5rem;margin-bottom:1rem;border:1px solid #cbd5e1;border-radius:20px;}
        .modal-buttons{display:flex;justify-content:flex-end;gap:1rem;margin-top:1rem;}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <h2>Управление администраторами</h2>
    <button id="addAdminBtn" class="btn btn-primary" style="margin:1rem 0;">+ Добавить администратора</button>
    <table id="adminsTable">
        <thead><tr><th>Логин</th><th>Роль</th><th>Действия</th></tr></thead>
        <tbody id="adminsTbody"></tbody>
    </table>
</div>

<div id="addAdminModal" class="modal">
    <div class="modal-content">
        <h3>Новый администратор</h3>
        <input type="text" id="newUsername" placeholder="Логин">
        <input type="password" id="newPassword" placeholder="Пароль">
        <select id="newRole">
            <option value="admin">Обычный администратор</option>
            <option value="super_admin">Главный администратор</option>
        </select>
        <div class="modal-buttons">
            <button id="cancelAddBtn" class="btn">Отмена</button>
            <button id="confirmAddBtn" class="btn btn-primary">Создать</button>
        </div>
    </div>
</div>

<div id="changePwdModal" class="modal">
    <div class="modal-content">
        <h3>Смена пароля</h3>
        <input type="password" id="newAdminPwd" placeholder="Новый пароль">
        <div class="modal-buttons">
            <button id="cancelPwdBtn" class="btn">Отмена</button>
            <button id="confirmPwdBtn" class="btn btn-primary">Сохранить</button>
        </div>
    </div>
</div>

<script>
    let currentAdminId = null;

    async function fetchJson(url, options={}) {
        const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', ...(options.headers||{}) } });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function checkAuth() {
        const res = await fetch('/api/check-session');
        const data = await res.json();
        if (!data.authenticated || data.role !== 'super_admin') {
            window.location.href = 'index.html';
            return false;
        }
        return true;
    }

    async function loadAdmins() {
        const admins = await fetchJson('/api/admins');
        const tbody = document.getElementById('adminsTbody');
        tbody.innerHTML = admins.map(a => `
            <tr>
                <td>${escapeHtml(a.username)}</td>
                <td>${a.role === 'super_admin' ? 'Главный' : 'Обычный'}</td>
                <td>
                    <button class="btn change-pwd" data-id="${a.id}" data-username="${escapeHtml(a.username)}">Сменить пароль</button>
                    ${a.username !== 'admin' ? `<button class="btn btn-danger delete-admin" data-id="${a.id}">Удалить</button>` : ''}
                </td>
            </tr>
        `).join('');
        document.querySelectorAll('.change-pwd').forEach(btn => btn.addEventListener('click', () => {
            currentAdminId = btn.dataset.id;
            document.getElementById('changePwdModal').style.display = 'flex';
        }));
        document.querySelectorAll('.delete-admin').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('Удалить администратора?')) {
                await fetch(`/api/admins/${btn.dataset.id}`, { method: 'DELETE' });
                loadAdmins();
            }
        }));
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    document.getElementById('addAdminBtn').addEventListener('click', () => {
        document.getElementById('addAdminModal').style.display = 'flex';
    });
    document.getElementById('cancelAddBtn').addEventListener('click', () => {
        document.getElementById('addAdminModal').style.display = 'none';
    });
    document.getElementById('confirmAddBtn').addEventListener('click', async () => {
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;
        if (!username || !password) { alert('Заполните логин и пароль'); return; }
        try {
            await fetchJson('/api/admins', { method: 'POST', body: JSON.stringify({ username, password, role }) });
            alert('Администратор создан');
            document.getElementById('addAdminModal').style.display = 'none';
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            loadAdmins();
        } catch (err) { alert(err.message); }
    });

    document.getElementById('confirmPwdBtn').addEventListener('click', async () => {
        const newPassword = document.getElementById('newAdminPwd').value;
        if (!newPassword) { alert('Введите новый пароль'); return; }
        try {
            await fetch(`/api/admins/${currentAdminId}/change-password`, { method: 'POST', body: JSON.stringify({ newPassword }) });
            alert('Пароль изменён');
            document.getElementById('changePwdModal').style.display = 'none';
            document.getElementById('newAdminPwd').value = '';
        } catch (err) { alert(err.message); }
    });
    document.getElementById('cancelPwdBtn').addEventListener('click', () => {
        document.getElementById('changePwdModal').style.display = 'none';
        document.getElementById('newAdminPwd').value = '';
    });

    checkAuth().then(ok => { if(ok) loadAdmins(); });
</script>
</body>
</html>
