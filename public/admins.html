<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Управление администраторами</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI','Inter',sans-serif;}
        body{background:#f1f5f9;padding:2rem;}
        .container{max-width:1000px;margin:0 auto;}
        .back-link{display:inline-block;margin-bottom:1rem;}
        .card{background:white;border-radius:32px;padding:1.5rem;margin-bottom:1rem;}
        table{width:100%;border-collapse:collapse;}
        th,td{border:1px solid #e2e8f0;padding:0.5rem;text-align:left;}
        .btn{background:#e2e8f0;border:none;padding:0.3rem 0.8rem;border-radius:20px;cursor:pointer;}
        .btn-primary{background:#3b82f6;color:white;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
        .modal-content{background:white;border-radius:32px;padding:2rem;width:400px;}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <div class="card"><h2>Администраторы</h2><button id="addAdminBtn" class="btn btn-primary">+ Добавить администратора</button><table id="adminsTable"><thead><tr><th>Логин</th><th>Роль</th><th>Дата создания</th><th>Действия</th></tr></thead><tbody id="adminsTbody"></tbody></table></div>
</div>
<div id="addModal" class="modal"><div class="modal-content"><h3>Новый администратор</h3><input type="text" id="newUsername" placeholder="Логин"><input type="password" id="newPassword" placeholder="Пароль"><select id="newRole"><option value="admin">Обычный администратор</option><option value="super_admin">Главный администратор</option></select><div style="margin-top:1rem;"><button id="cancelAddBtn">Отмена</button><button id="confirmAddBtn">Создать</button></div></div></div>
<script>
    async function fetchJson(url, options) { const res = await fetch(url, options); if (!res.ok) throw new Error(await res.text()); return res.json(); }
    async function loadAdmins() {
        const admins = await fetchJson('/api/users-list', { method: 'GET' });
        const tbody = document.getElementById('adminsTbody');
        tbody.innerHTML = admins.map(a => `<tr><td>${escapeHtml(a.username)}</td><td>${escapeHtml(a.role)}</td><td>${new Date(a.created_at).toLocaleString()}</td><td>${a.username !== 'admin' ? `<button class="btn delete-admin" data-id="${a.id}">Удалить</button>` : ''}</td></tr>`).join('');
        document.querySelectorAll('.delete-admin').forEach(btn => btn.onclick = async () => { if(confirm('Удалить администратора?')) { await fetchJson('/api/delete-admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: parseInt(btn.dataset.id) }) }); loadAdmins(); } });
    }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    document.getElementById('addAdminBtn').onclick = () => document.getElementById('addModal').style.display = 'flex';
    document.getElementById('cancelAddBtn').onclick = () => document.getElementById('addModal').style.display = 'none';
    document.getElementById('confirmAddBtn').onclick = async () => {
        const username = document.getElementById('newUsername').value;
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;
        if (!username || !password) { alert('Заполните поля'); return; }
        await fetchJson('/api/create-admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, role }) });
        alert('Администратор создан');
        document.getElementById('addModal').style.display = 'none';
        loadAdmins();
    };
    loadAdmins();
</script>
</body>
</html>
