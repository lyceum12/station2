<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление админами</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#f1f5f9;padding:2rem;}
        .container{max-width:1000px;margin:0 auto;}
        .back-link{display:inline-block;margin-bottom:1.5rem;color:#3b82f6;text-decoration:none;}
        .card{background:white;border-radius:32px;padding:1.5rem;margin-bottom:2rem;}
        table{width:100%;border-collapse:collapse;}
        th,td{border:1px solid #e2e8f0;padding:0.75rem;text-align:left;}
        th{background:#f8fafc;}
        .btn{padding:0.5rem 1rem;border-radius:40px;border:none;cursor:pointer;}
        .btn-primary{background:#3b82f6;color:white;}
        .btn-danger{background:#fee2e2;color:#b91c1c;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:white;border-radius:32px;padding:2rem;width:400px;}
        input{width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid #ccc;border-radius:20px;}
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="back-link">← На главную</a>
    <div class="card">
        <h2>Управление администраторами</h2>
        <button id="addAdminBtn" class="btn btn-primary">+ Добавить администратора</button>
        <table style="margin-top:1rem;">
            <thead><tr><th>Логин</th><th>Роль</th><th>Действия</th></tr></thead>
            <tbody id="adminsTable"></tbody>
        </table>
    </div>
</div>
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>Добавить администратора</h3>
        <input type="text" id="newLogin" placeholder="Логин">
        <input type="password" id="newPassword" placeholder="Пароль">
        <select id="newRole"><option value="admin">Обычный админ</option><option value="superadmin">Супер-админ</option></select>
        <div style="margin-top:1rem; display:flex; gap:1rem; justify-content:flex-end;">
            <button id="cancelModal" class="btn">Отмена</button>
            <button id="confirmAdd" class="btn btn-primary">Добавить</button>
        </div>
    </div>
</div>
<script>
    async function loadAdmins() {
        const res = await fetch('/api/admins');
        if (!res.ok) { alert('Доступ запрещён'); window.location.href = 'dashboard.html'; return; }
        const admins = await res.json();
        const tbody = document.getElementById('adminsTable');
        tbody.innerHTML = admins.map(a => `
            <tr>
                <td>${escapeHtml(a.login)}</td>
                <td>${a.role === 'superadmin' ? 'Супер-админ' : 'Админ'}</td>
                <td><button class="btn btn-danger delete-admin" data-id="${a.id}">Удалить</button></td>
            </tr>
        `).join('');
        document.querySelectorAll('.delete-admin').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('Удалить администратора?')) {
                await fetch(`/api/admins/${btn.dataset.id}`, { method: 'DELETE' });
                loadAdmins();
            }
        }));
    }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    const modal = document.getElementById('addModal');
    document.getElementById('addAdminBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('cancelModal').onclick = () => modal.style.display = 'none';
    document.getElementById('confirmAdd').onclick = async () => {
        const login = document.getElementById('newLogin').value.trim();
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;
        if (!login || !password) { alert('Заполните логин и пароль'); return; }
        const res = await fetch('/api/admins', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password, role })
        });
        if (res.ok) { modal.style.display = 'none'; loadAdmins(); }
        else alert('Ошибка: логин уже существует');
    };
    loadAdmins();
</script>
</body>
</html>
