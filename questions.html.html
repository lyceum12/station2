<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление вопросами | Тест-конструктор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }
        body {
            background: #f1f5f9;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
        }
        .back-link:hover {
            background: #f8fafc;
        }
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .test-title-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }
        .test-title-display {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .test-title-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }
        .edit-title-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
            transition: 0.2s;
            color: #64748b;
        }
        .edit-title-btn:hover {
            background: #e2e8f0;
            color: #3b82f6;
        }
        .title-edit-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .title-input {
            padding: 0.5rem 1rem;
            font-size: 1.3rem;
            border: 2px solid #3b82f6;
            border-radius: 40px;
            outline: none;
            font-weight: 600;
        }
        .test-badge {
            background: #e2e8f0;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn {
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px);}
        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
        }
        .btn-outline:hover { background: #f1f5f9;}
        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover { background: #059669; }
        .questions-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .question-card {
            background: white;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #e2e8f0;
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .question-preview {
            flex: 1;
        }
        .question-preview h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #0f172a;
        }
        .question-meta {
            font-size: 0.75rem;
            color: #475569;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .question-actions {
            display: flex;
            gap: 10px;
        }
        .empty-questions {
            background: white;
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            color: #64748b;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <div class="header-info">
        <div class="test-title-section">
            <div id="testTitleContainer"></div>
            <div class="test-badge" id="testIdBadge"></div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-outline" id="manageTestBtn">⚙️ Управление тестом</button>
            <button class="btn btn-primary" id="createNewQuestionBtn">➕ Создать вопрос</button>
        </div>
    </div>
    
    <div id="questionsListContainer" class="questions-grid"></div>
    <footer>✏️ Нажмите на значок карандаша рядом с названием теста, чтобы изменить его. Каждый вопрос можно редактировать через расширенный редактор.</footer>
</div>

<script>
    let currentTest = null;
    let currentTestId = null;
    let isEditingTitle = false;
    
    function getTestsFromStorage() {
        const stored = localStorage.getItem("quiz_constructor_app");
        return stored ? JSON.parse(stored) : [];
    }
    
    function saveTestsToStorage(tests) {
        localStorage.setItem("quiz_constructor_app", JSON.stringify(tests));
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.background = isError ? '#ef4444' : '#10b981';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function loadTestFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const testId = params.get("testId");
        if(!testId) {
            document.getElementById("testTitleContainer").innerHTML = "<span style='color:red'>Ошибка: тест не указан</span>";
            return null;
        }
        const tests = getTestsFromStorage();
        const test = tests.find(t => t.id === testId);
        if(!test) {
            document.getElementById("testTitleContainer").innerHTML = "<span style='color:red'>Тест не найден</span>";
            return null;
        }
        currentTest = test;
        currentTestId = testId;
        renderTestTitle();
        document.getElementById("testIdBadge").innerText = `ID: ${test.id.slice(0,8)}`;
        renderQuestionsList();
        return test;
    }
    
    function renderTestTitle() {
        const container = document.getElementById("testTitleContainer");
        if(!currentTest) return;
        
        if(isEditingTitle) {
            container.innerHTML = `
                <div class="title-edit-form">
                    <input type="text" id="editTitleInput" class="title-input" value="${escapeHtml(currentTest.title)}" autofocus>
                    <button class="btn btn-success btn-sm" id="saveTitleBtn">💾 Сохранить</button>
                    <button class="btn btn-outline btn-sm" id="cancelTitleBtn">Отмена</button>
                </div>
            `;
            const input = document.getElementById("editTitleInput");
            const saveBtn = document.getElementById("saveTitleBtn");
            const cancelBtn = document.getElementById("cancelTitleBtn");
            
            saveBtn.addEventListener("click", () => {
                const newTitle = input.value.trim();
                if(!newTitle) {
                    showToast("Название не может быть пустым", true);
                    return;
                }
                const tests = getTestsFromStorage();
                const testIndex = tests.findIndex(t => t.id === currentTestId);
                if(testIndex !== -1) {
                    tests[testIndex].title = newTitle;
                    saveTestsToStorage(tests);
                    currentTest.title = newTitle;
                    showToast("Название теста обновлено!");
                    isEditingTitle = false;
                    renderTestTitle();
                }
            });
            
            cancelBtn.addEventListener("click", () => {
                isEditingTitle = false;
                renderTestTitle();
            });
            
            input.addEventListener("keypress", (e) => {
                if(e.key === "Enter") saveBtn.click();
            });
        } else {
            container.innerHTML = `
                <div class="test-title-display">
                    <span class="test-title-text">📋 ${escapeHtml(currentTest.title)}</span>
                    <button class="edit-title-btn" id="editTitleBtn" title="Редактировать название теста">✏️</button>
                </div>
            `;
            document.getElementById("editTitleBtn")?.addEventListener("click", () => {
                isEditingTitle = true;
                renderTestTitle();
            });
        }
    }
    
    function renderQuestionsList() {
        const container = document.getElementById("questionsListContainer");
        if(!currentTest) {
            container.innerHTML = `<div class="empty-questions">⚠️ Тест не загружен</div>`;
            return;
        }
        const questions = currentTest.questions || [];
        if(questions.length === 0) {
            container.innerHTML = `<div class="empty-questions">📭 В этом тесте пока нет вопросов. Нажмите "Создать вопрос"</div>`;
            return;
        }
        container.innerHTML = questions.map((q, idx) => `
            <div class="question-card" data-qid="${q.id}">
                <div class="question-preview">
                    <h3>❓ ${escapeHtml(q.titleQuestion || "Без заголовка")}</h3>
                    <div class="question-meta">
                        <span>🔢 Вопрос #${idx+1}</span>
                        <span>✅ Правильных ответов: ${(q.correctIndices?.length || q.answers?.filter(a => a.isCorrect).length || 0)}</span>
                        <span>📎 ${q.requireFileAttachment ? '📎 Требует файл' : '📄 Без файла'}</span>
                    </div>
                </div>
                <div class="question-actions">
                    <button class="btn btn-outline btn-sm edit-question" data-qid="${q.id}">✏️ Редактировать</button>
                    <button class="btn btn-danger btn-sm delete-question" data-qid="${q.id}">🗑 Удалить</button>
                </div>
            </div>
        `).join("");
        
        document.querySelectorAll(".edit-question").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const qid = btn.getAttribute("data-qid");
                window.location.href = `edit-question.html?testId=${encodeURIComponent(currentTestId)}&questionId=${encodeURIComponent(qid)}`;
            });
        });
        document.querySelectorAll(".delete-question").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const qid = btn.getAttribute("data-qid");
                if(confirm("Удалить этот вопрос?")) {
                    const tests = getTestsFromStorage();
                    const testIndex = tests.findIndex(t => t.id === currentTestId);
                    if(testIndex !== -1) {
                        tests[testIndex].questions = tests[testIndex].questions.filter(q => q.id !== qid);
                        saveTestsToStorage(tests);
                        currentTest = tests[testIndex];
                        renderQuestionsList();
                        showToast("Вопрос удалён");
                    }
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById("createNewQuestionBtn")?.addEventListener("click", () => {
        if(!currentTestId) return;
        window.location.href = `edit-question.html?testId=${encodeURIComponent(currentTestId)}&mode=new`;
    });
    
    document.getElementById("manageTestBtn")?.addEventListener("click", () => {
        if(!currentTestId) return;
        window.location.href = `manage-test.html?testId=${encodeURIComponent(currentTestId)}`;
    });
    
    loadTestFromUrl();
</script>
</body>
</html>
